<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>십진 모형 놀이</title>
<style>
  :root{
    --u:54px;
    --ink:#243049;
    --soft:#6c748a;
    --panel:rgba(255,255,255,.82);
    --one:#ffd8e5;
    --one2:#ffc3d4;
    --one-border:#ff6f95;
    --ten:#9be9f4;
    --ten2:#78dce9;
    --ten-border:#2db2c8;
    --hundred:#d5f6ca;
    --hundred2:#bdf0af;
    --hundred-border:#66bd59;
    --purple:#8f7bff;
    --yellow:#ffe66d;
    --shadow:0 20px 58px rgba(70,58,102,.14),0 8px 20px rgba(70,58,102,.08);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    margin:0;width:100%;height:100%;overflow:hidden;color:var(--ink);
    font-family:ui-rounded,"Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
    background:
      radial-gradient(circle at 10% 9%,rgba(255,232,114,.46),transparent 29%),
      radial-gradient(circle at 88% 10%,rgba(147,235,249,.38),transparent 31%),
      radial-gradient(circle at 13% 92%,rgba(255,197,216,.34),transparent 34%),
      radial-gradient(circle at 86% 88%,rgba(209,248,198,.42),transparent 34%),
      linear-gradient(135deg,#fffdf7 0%,#f2fbff 52%,#fff9fc 100%);
  }
  button{font:inherit;border:0;background:none;padding:0;cursor:pointer;user-select:none;touch-action:none;color:inherit}

  #app{position:fixed;inset:0;overflow:hidden}
  #stage{
    position:absolute;z-index:1;inset:8px;overflow:hidden;border-radius:34px;touch-action:none;
    background:
      linear-gradient(rgba(255,255,255,.86),rgba(255,255,255,.68)),
      radial-gradient(circle at 20% 18%,rgba(147,235,249,.23),transparent 40%),
      radial-gradient(circle at 82% 18%,rgba(255,196,216,.24),transparent 38%),
      radial-gradient(circle at 68% 88%,rgba(210,248,198,.28),transparent 42%);
    border:1px solid rgba(126,105,170,.14);box-shadow:var(--shadow);
  }
  #stage::before{
    content:"";position:absolute;inset:0;pointer-events:none;opacity:.12;
    background-image:radial-gradient(circle,rgba(89,79,125,.36) 1.1px,transparent 1.55px);
    background-size:34px 34px;
    mask-image:linear-gradient(to bottom,transparent 0,#000 8%,#000 91%,transparent 100%);
  }
  #blockLayer,#fxLayer{position:absolute;inset:0;pointer-events:none}
  #blockLayer{z-index:20}
  #fxLayer{z-index:130}
  #drawCanvas{position:absolute;z-index:80;inset:0;width:100%;height:100%;pointer-events:none;touch-action:none;cursor:crosshair}
  #drawCanvas.active{pointer-events:auto}

  .palette{
    position:absolute;z-index:210;left:max(16px,env(safe-area-inset-left));top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column;align-items:center;gap:13px;padding:13px;border-radius:30px;
    background:var(--panel);backdrop-filter:blur(18px) saturate(1.2);-webkit-backdrop-filter:blur(18px) saturate(1.2);
    border:1px solid rgba(126,105,170,.14);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.9);
  }
  .stamp{
    position:relative;display:grid;place-items:center;cursor:grab;touch-action:none;user-select:none;
    font-family:Georgia,"Times New Roman",serif;font-weight:850;color:#172238;
    transition:transform .2s cubic-bezier(.2,1.35,.36,1),filter .2s ease,box-shadow .2s ease;
  }
  .stamp::after,.block::after,.ghost::after{
    content:"";position:absolute;right:8px;top:8px;width:12px;height:12px;border-radius:999px;
    background:rgba(255,255,255,.66);box-shadow:-5px 7px 0 -4px rgba(255,255,255,.86);pointer-events:none;
  }
  .stamp:hover{transform:translateY(-4px) rotate(-1deg);filter:saturate(1.08)}
  .stamp:active{cursor:grabbing;transform:scale(.95)}
  .stamp.one{width:54px;height:54px;border-radius:15px;background:linear-gradient(145deg,var(--one),var(--one2));border:2px solid var(--one-border);font-size:28px;box-shadow:0 9px 19px rgba(255,113,146,.22)}
  .stamp.ten{width:78px;height:54px;border-radius:15px;background:linear-gradient(145deg,var(--ten),var(--ten2));border:2px solid var(--ten-border);font-size:27px;box-shadow:0 9px 19px rgba(46,180,202,.22)}
  .stamp.hundred{width:82px;height:82px;border-radius:18px;background:linear-gradient(145deg,var(--hundred),var(--hundred2));border:2px solid var(--hundred-border);font-size:27px;box-shadow:0 9px 19px rgba(101,191,90,.22)}

  .toolbar{
    position:absolute;z-index:300;left:50%;bottom:max(12px,env(safe-area-inset-bottom));transform:translateX(-50%);
    display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:999px;max-width:calc(100vw - 18px);
    overflow-x:auto;scrollbar-width:none;background:var(--panel);backdrop-filter:blur(18px) saturate(1.25);-webkit-backdrop-filter:blur(18px) saturate(1.25);
    border:1px solid rgba(126,105,170,.15);box-shadow:0 16px 38px rgba(58,49,86,.14),inset 0 1px 0 rgba(255,255,255,.9);
  }
  .toolbar::-webkit-scrollbar{display:none}
  .tool-btn{
    position:relative;width:58px;height:50px;flex:0 0 auto;border-radius:18px;
    background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(255,255,255,.80));
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    box-shadow:inset 0 0 0 1px rgba(82,70,125,.10),0 7px 16px rgba(61,51,86,.10);
    transition:transform .18s cubic-bezier(.2,1.3,.35,1),box-shadow .18s ease,background .18s ease,filter .18s ease;
  }
  .tool-btn:hover{transform:translateY(-2px) rotate(-1deg);box-shadow:inset 0 0 0 1px rgba(82,70,125,.15),0 12px 22px rgba(61,51,86,.14)}
  .tool-btn:active{transform:scale(.94)}
  .tool-btn.active{background:linear-gradient(180deg,#fff8bd,#fff2a0);box-shadow:0 0 0 4px rgba(255,226,96,.25),inset 0 0 0 1px rgba(173,135,20,.22),0 10px 21px rgba(166,125,22,.14)}
  .tool-btn.drop-hot{transform:translateY(-3px) scale(1.08);background:linear-gradient(180deg,#f7f3ff,#ebe6ff);box-shadow:0 0 0 8px rgba(140,118,255,.18),inset 0 0 0 2px rgba(140,118,255,.32),0 14px 27px rgba(140,118,255,.21)}
  .tool-btn.disabled{opacity:.45}
  .tool-btn .ico{font-size:20px;line-height:1;filter:drop-shadow(0 1px 0 rgba(255,255,255,.9))}
  .tool-btn .txt{font-size:9px;font-weight:950;letter-spacing:-.08em;line-height:1;white-space:nowrap;color:#30384d;margin-top:1px}

  .block{
    --x:0px;--y:0px;position:absolute;left:0;top:0;z-index:20;display:grid;place-items:center;
    transform:translate(var(--x),var(--y));user-select:none;touch-action:none;pointer-events:auto;cursor:grab;
    font-family:Georgia,"Times New Roman",serif;font-weight:850;color:#172238;
    transition:box-shadow .18s ease,filter .18s ease;will-change:transform,opacity;
  }
  .block:active{cursor:grabbing}
  .block.one{width:var(--u);height:var(--u);border-radius:14px;background:linear-gradient(145deg,var(--one),var(--one2));border:2px solid var(--one-border);font-size:calc(var(--u)*.50);box-shadow:0 8px 18px rgba(255,113,146,.21),inset 0 1px 0 rgba(255,255,255,.68)}
  .block.ten{width:calc(var(--u)*1.28);height:var(--u);border-radius:14px;background:linear-gradient(145deg,var(--ten),var(--ten2));border:2px solid var(--ten-border);font-size:calc(var(--u)*.50);box-shadow:0 8px 18px rgba(46,180,202,.21),inset 0 1px 0 rgba(255,255,255,.68)}
  .block.hundred{width:calc(var(--u)*1.68);height:calc(var(--u)*1.68);border-radius:18px;background:linear-gradient(145deg,var(--hundred),var(--hundred2));border:2px solid var(--hundred-border);font-size:calc(var(--u)*.46);box-shadow:0 9px 20px rgba(101,191,90,.21),inset 0 1px 0 rgba(255,255,255,.68)}
  .block.selected{filter:saturate(1.16) brightness(1.02);box-shadow:0 0 0 4px rgba(255,226,96,.64),0 12px 25px rgba(53,46,78,.18),inset 0 1px 0 rgba(255,255,255,.72)}
  .block.dragging{filter:saturate(1.18);transition:none;transform:translate(var(--x),var(--y)) scale(1.035);box-shadow:0 21px 42px rgba(51,43,72,.22),0 0 0 4px rgba(140,118,255,.30),inset 0 1px 0 rgba(255,255,255,.74)}
  .block.pop-in{animation:popIn .35s cubic-bezier(.18,1.45,.38,1)}
  .block.fade-out{pointer-events:none;animation:fadeOut .24s ease forwards}
  .block.fold-out{pointer-events:none;animation:foldOut .28s cubic-bezier(.68,0,.8,.2) forwards}

  .ghost,.afterimage{
    position:fixed;z-index:360;pointer-events:none;display:grid;place-items:center;font-family:Georgia,"Times New Roman",serif;font-weight:850;color:#172238;
  }
  .ghost{opacity:.86;transform:translate(-50%,-50%) scale(1.04);filter:drop-shadow(0 14px 18px rgba(48,40,70,.20))}
  .ghost.one{width:54px;height:54px;border-radius:15px;background:linear-gradient(145deg,var(--one),var(--one2));border:2px solid var(--one-border);font-size:28px}
  .ghost.ten{width:78px;height:54px;border-radius:15px;background:linear-gradient(145deg,var(--ten),var(--ten2));border:2px solid var(--ten-border);font-size:27px}
  .ghost.hundred{width:82px;height:82px;border-radius:18px;background:linear-gradient(145deg,var(--hundred),var(--hundred2));border:2px solid var(--hundred-border);font-size:27px}

  #selectionBox{
    position:absolute;z-index:112;display:none;pointer-events:none;border:2px solid rgba(140,118,255,.72);border-radius:22px;
    background:rgba(140,118,255,.12);box-shadow:0 0 0 6px rgba(140,118,255,.08),inset 0 1px 0 rgba(255,255,255,.58);
  }
  .selection-after{
    position:absolute;z-index:111;pointer-events:none;border:2px solid rgba(140,118,255,.44);border-radius:22px;
    background:rgba(140,118,255,.10);box-shadow:0 0 0 8px rgba(140,118,255,.08);animation:selectFade .78s ease-out forwards;
  }
  .afterimage{
    position:absolute;left:0;top:0;z-index:108;opacity:.32;filter:saturate(1.05);animation:trailFade .62s ease-out forwards;
    transform:translate(var(--x),var(--y));
  }
  .afterimage.one{width:var(--u);height:var(--u);border-radius:14px;background:linear-gradient(145deg,var(--one),var(--one2));border:2px solid var(--one-border);font-size:calc(var(--u)*.50)}
  .afterimage.ten{width:calc(var(--u)*1.28);height:var(--u);border-radius:14px;background:linear-gradient(145deg,var(--ten),var(--ten2));border:2px solid var(--ten-border);font-size:calc(var(--u)*.50)}
  .afterimage.hundred{width:calc(var(--u)*1.68);height:calc(var(--u)*1.68);border-radius:18px;background:linear-gradient(145deg,var(--hundred),var(--hundred2));border:2px solid var(--hundred-border);font-size:calc(var(--u)*.46)}

  .spark{position:absolute;z-index:135;width:10px;height:10px;border-radius:999px;pointer-events:none;background:rgba(255,226,96,.98);box-shadow:0 0 0 5px rgba(255,255,255,.42);animation:sparkle .62s ease-out forwards}
  .ring{position:absolute;z-index:134;width:18px;height:18px;border-radius:999px;pointer-events:none;border:3px solid rgba(255,226,96,.88);animation:ring .62s ease-out forwards}

  @keyframes popIn{0%{opacity:0;transform:translate(var(--x),var(--y)) scale(.58) rotate(-5deg)}70%{opacity:1;transform:translate(var(--x),var(--y)) scale(1.08) rotate(1deg)}100%{opacity:1;transform:translate(var(--x),var(--y)) scale(1) rotate(0)}}
  @keyframes fadeOut{to{opacity:0;transform:translate(var(--x),var(--y)) scale(.68) rotate(6deg)}}
  @keyframes foldOut{to{opacity:0;transform:translate(var(--x),var(--y)) scale(.16);filter:blur(1px)}}
  @keyframes selectFade{0%{opacity:.85;transform:scale(1)}100%{opacity:0;transform:scale(1.035)}}
  @keyframes trailFade{0%{opacity:.32;transform:translate(var(--x),var(--y)) scale(1)}100%{opacity:0;transform:translate(var(--x),var(--y)) scale(1.08)}}
  @keyframes sparkle{0%{opacity:1;transform:translate(-50%,-50%) scale(.65)}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.08)}}
  @keyframes ring{0%{opacity:.9;transform:translate(-50%,-50%) scale(.4)}100%{opacity:0;transform:translate(-50%,-50%) scale(3.3)}}

  @media (max-width:760px){
    #stage{inset:6px;border-radius:27px}.toolbar{gap:6px;padding:6px;justify-content:flex-start}.tool-btn{width:51px;height:47px;border-radius:16px}.tool-btn .ico{font-size:18px}.tool-btn .txt{font-size:8px}.palette{left:8px;gap:10px;padding:9px;border-radius:25px}.stamp.one{width:48px;height:48px;font-size:25px}.stamp.ten{width:68px;height:48px;font-size:24px}.stamp.hundred{width:62px;height:62px;font-size:22px}
  }
  @media (max-height:520px){
    .toolbar{bottom:7px}.palette{gap:8px;padding:8px}.tool-btn{height:42px}.stamp.one{width:46px;height:46px}.stamp.ten{width:64px;height:46px}.stamp.hundred{width:60px;height:60px}
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage" aria-label="십진 모형 활동판">
    <div id="blockLayer"></div>
    <canvas id="drawCanvas"></canvas>
    <div id="selectionBox"></div>
    <div id="fxLayer"></div>
  </div>

  <div class="palette" aria-label="모형 추가">
    <button class="stamp one" data-type="one" aria-label="일모형">1</button>
    <button class="stamp ten" data-type="ten" aria-label="십모형">10</button>
    <button class="stamp hundred" data-type="hundred" aria-label="백모형">100</button>
  </div>

  <div class="toolbar" aria-label="도구">
    <button class="tool-btn" id="undoBtn" aria-label="되돌리기" title="되돌리기"><span class="ico">↶</span><span class="txt">되돌리기</span></button>
    <button class="tool-btn" id="mergeBtn" data-drop-action="merge" aria-label="합치기" title="합치기"><span class="ico">🧲</span><span class="txt">합치기</span></button>
    <button class="tool-btn" id="splitBtn" data-drop-action="split" aria-label="쪼개기" title="쪼개기"><span class="ico">✂️</span><span class="txt">쪼개기</span></button>
    <button class="tool-btn" id="deleteBtn" data-drop-action="delete" aria-label="삭제" title="삭제"><span class="ico">🧺</span><span class="txt">삭제</span></button>
    <button class="tool-btn" id="penBtn" aria-label="펜" title="펜"><span class="ico">✏️</span><span class="txt">펜</span></button>
    <button class="tool-btn" id="highBtn" aria-label="형광펜" title="형광펜"><span class="ico">🖍️</span><span class="txt">형광펜</span></button>
    <button class="tool-btn" id="eraserBtn" aria-label="지우개" title="지우개"><span class="ico">🧽</span><span class="txt">지우개</span></button>
    <button class="tool-btn" id="fullBtn" aria-label="전체화면" title="전체화면"><span class="ico">⛶</span><span class="txt">전체</span></button>
  </div>
</div>

<script>
(() => {
  const app = document.getElementById('app');
  const stage = document.getElementById('stage');
  const blockLayer = document.getElementById('blockLayer');
  const fxLayer = document.getElementById('fxLayer');
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  const selectionBox = document.getElementById('selectionBox');
  const palette = document.querySelector('.palette');
  const toolbar = document.querySelector('.toolbar');

  const undoBtn = document.getElementById('undoBtn');
  const mergeBtn = document.getElementById('mergeBtn');
  const splitBtn = document.getElementById('splitBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const penBtn = document.getElementById('penBtn');
  const highBtn = document.getElementById('highBtn');
  const eraserBtn = document.getElementById('eraserBtn');
  const fullBtn = document.getElementById('fullBtn');
  const stamps = [...document.querySelectorAll('.stamp')];
  const dropButtons = [...document.querySelectorAll('[data-drop-action]')];

  const labels = { one:'1', ten:'10', hundred:'100' };
  const higher = { one:'ten', ten:'hundred' };
  const lower = { ten:'one', hundred:'ten' };

  let blocks = new Map();
  let selected = new Set();
  let nextId = 1;
  let topZ = 30;
  let lastActiveId = null;
  let mode = 'move';
  let busy = false;
  let history = [];
  let dpr = Math.max(1, window.devicePixelRatio || 1);
  let spawn = { x:150, y:26, rowH:0 };

  function clamp(v,min,max){ return Math.min(Math.max(v,min), Math.max(min,max)); }

  function stageRect(){ return stage.getBoundingClientRect(); }

  function localPoint(ev){
    const r = stageRect();
    return { x:ev.clientX-r.left, y:ev.clientY-r.top, inside:ev.clientX>=r.left && ev.clientX<=r.right && ev.clientY>=r.top && ev.clientY<=r.bottom };
  }

  function intersects(a,b){ return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top; }

  function safeInsets(){
    const s = stageRect();
    const p = palette.getBoundingClientRect();
    const t = toolbar.getBoundingClientRect();
    let left = 14, right = 14, top = 14, bottom = 14;
    if (intersects(s,p)) left = Math.max(left, p.right - s.left + 14);
    if (intersects(s,t)) bottom = Math.max(bottom, s.bottom - t.top + 14);
    return { left, right, top, bottom };
  }

  function fitUnit(){
    const r = stageRect();
    const inset = safeInsets();
    const w = Math.max(320, r.width - inset.left - inset.right);
    const h = Math.max(240, r.height - inset.top - inset.bottom);
    const u = Math.max(38, Math.min(58, Math.floor(Math.min(w/13.5, h/7.2))));
    stage.style.setProperty('--u', `${u}px`);
  }

  function blockSize(type){
    const u = parseFloat(getComputedStyle(stage).getPropertyValue('--u')) || 54;
    if (type === 'hundred') return { w:u*1.68, h:u*1.68 };
    if (type === 'ten') return { w:u*1.28, h:u };
    return { w:u, h:u };
  }

  function clampPos(type,x,y){
    const s = blockSize(type);
    const inset = safeInsets();
    return {
      x:clamp(x, inset.left, stage.clientWidth - inset.right - s.w),
      y:clamp(y, inset.top, stage.clientHeight - inset.bottom - s.h)
    };
  }

  function updateCanvasSize(keep=true){
    const r = stageRect();
    const old = document.createElement('canvas');
    const oldDpr = dpr;
    let oldCssW = 0, oldCssH = 0;
    if (keep && canvas.width && canvas.height) {
      old.width = canvas.width;
      old.height = canvas.height;
      old.getContext('2d').drawImage(canvas,0,0);
      oldCssW = canvas.width / oldDpr;
      oldCssH = canvas.height / oldDpr;
    }
    dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.max(1, Math.round(r.width*dpr));
    canvas.height = Math.max(1, Math.round(r.height*dpr));
    canvas.style.width = `${r.width}px`;
    canvas.style.height = `${r.height}px`;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (keep && old.width) ctx.drawImage(old,0,0,oldCssW,oldCssH,0,0,r.width,r.height);
  }

  function snapshotInk(){
    try { return canvas.toDataURL('image/png'); } catch(_e) { return ''; }
  }

  function snapshot(){
    return {
      blocks:[...blocks.values()].map(b => ({ id:b.id, type:b.type, x:b.x, y:b.y, z:b.z })),
      selected:[...selected],
      nextId, topZ,
      spawn:{...spawn},
      ink:snapshotInk()
    };
  }

  function saveState(){
    history.push(snapshot());
    if (history.length > 80) history.shift();
    updateUndo();
  }

  function updateUndo(){ undoBtn.classList.toggle('disabled', history.length === 0); }

  function clearCanvas(){ ctx.clearRect(0,0,stage.clientWidth,stage.clientHeight); }

  function restoreInk(data){
    clearCanvas();
    if (!data) return;
    const img = new Image();
    img.onload = () => {
      clearCanvas();
      ctx.drawImage(img,0,0,stage.clientWidth,stage.clientHeight);
    };
    img.src = data;
  }

  function clearBlocksDom(){
    blockLayer.querySelectorAll('.block').forEach(el => el.remove());
  }

  function restore(state){
    clearBlocksDom();
    blocks.clear();
    selected = new Set(state.selected || []);
    nextId = state.nextId || 1;
    topZ = state.topZ || 30;
    spawn = state.spawn || { x:safeInsets().left+16, y:safeInsets().top+16, rowH:0 };
    (state.blocks || []).forEach(item => createBlock(item.type,item.x,item.y,{ id:item.id, z:item.z, silent:true }));
    updateSelection();
    restoreInk(state.ink);
    updateUndo();
  }

  function undo(){
    if (!history.length) { pulse(undoBtn); return; }
    restore(history.pop());
    pulse(undoBtn);
  }

  function positionBlock(b){
    b.el.style.setProperty('--x', `${b.x}px`);
    b.el.style.setProperty('--y', `${b.y}px`);
    b.el.style.zIndex = b.z;
  }

  function createBlock(type,x,y,opt={}){
    const id = opt.id ?? nextId++;
    const el = document.createElement('div');
    el.className = `block ${type}`;
    el.dataset.id = String(id);
    el.innerHTML = `<span>${labels[type]}</span>`;
    el.setAttribute('aria-label', labels[type]);
    blockLayer.appendChild(el);
    const b = { id, type, x, y, z: opt.z ?? topZ++, el };
    blocks.set(id,b);
    const pos = clampPos(type,b.x,b.y);
    b.x = pos.x; b.y = pos.y;
    positionBlock(b);
    el.addEventListener('pointerdown', onBlockPointerDown);
    if (!opt.silent) {
      requestAnimationFrame(() => el.classList.add('pop-in'));
      el.addEventListener('animationend', () => el.classList.remove('pop-in'), { once:true });
    }
    nextId = Math.max(nextId, id+1);
    topZ = Math.max(topZ, b.z+1);
    return b;
  }

  function addBlock(type,x,y,opt={}){
    const s = blockSize(type);
    const startX = opt.center ? x - s.w/2 : x;
    const startY = opt.center ? y - s.h/2 : y;
    const b = createBlock(type,startX,startY,opt);
    if (opt.select !== false) { selected.clear(); selected.add(b.id); updateSelection(); }
    const c = centerOf(b);
    sparkle(c.x,c.y);
    return b;
  }

  function updateSelection(){
    blocks.forEach(b => b.el.classList.toggle('selected', selected.has(b.id)));
  }

  function clearSelection(){ selected.clear(); updateSelection(); }

  function selectedBlocks(){ return [...selected].map(id => blocks.get(id)).filter(Boolean); }

  function centerOf(b){ const s = blockSize(b.type); return { x:b.x+s.w/2, y:b.y+s.h/2 }; }

  function sortByPlace(a,b){ return (a.y-b.y) || (a.x-b.x); }

  function averageCenter(group){
    let x=0,y=0;
    group.forEach(b => { const c=centerOf(b); x+=c.x; y+=c.y; });
    return { x:x/group.length, y:y/group.length };
  }

  function nextPosition(type){
    const inset = safeInsets();
    const d = blockSize(type);
    const gap = 13;
    if (spawn.x < inset.left || spawn.y < inset.top) spawn = { x:inset.left+16, y:inset.top+16, rowH:0 };
    if (spawn.x + d.w > stage.clientWidth - inset.right) {
      spawn.x = inset.left + 16;
      spawn.y += Math.max(66, spawn.rowH + gap);
      spawn.rowH = 0;
    }
    if (spawn.y + d.h > stage.clientHeight - inset.bottom) {
      spawn.x = inset.left + 16;
      spawn.y = inset.top + 16;
      spawn.rowH = 0;
    }
    const pos = clampPos(type, spawn.x, spawn.y);
    spawn.x = pos.x + d.w + gap;
    spawn.rowH = Math.max(spawn.rowH, d.h);
    return pos;
  }

  function pulse(btn){
    btn.animate([{transform:'scale(1)'},{transform:'scale(.88)'},{transform:'scale(1)'}], {duration:220, easing:'ease-out'});
  }

  function sparkle(x,y){
    const ring = document.createElement('span');
    ring.className = 'ring';
    ring.style.left = `${x}px`; ring.style.top = `${y}px`;
    fxLayer.appendChild(ring);
    ring.addEventListener('animationend', () => ring.remove(), { once:true });
    for (let i=0;i<8;i++){
      const s = document.createElement('span');
      s.className = 'spark';
      const a = i*Math.PI/4 + Math.random()*.32;
      const d = 24 + Math.random()*23;
      s.style.left = `${x}px`; s.style.top = `${y}px`;
      s.style.setProperty('--dx', `${Math.cos(a)*d}px`);
      s.style.setProperty('--dy', `${Math.sin(a)*d}px`);
      fxLayer.appendChild(s);
      s.addEventListener('animationend', () => s.remove(), { once:true });
    }
  }

  function setMode(next){
    mode = (mode === next) ? 'move' : next;
    penBtn.classList.toggle('active', mode === 'pen');
    highBtn.classList.toggle('active', mode === 'high');
    eraserBtn.classList.toggle('active', mode === 'eraser');
    canvas.classList.toggle('active', mode === 'pen' || mode === 'high' || mode === 'eraser');
    stage.style.cursor = (mode === 'move') ? 'default' : 'crosshair';
  }

  function dropButtonAt(x,y){
    const el = document.elementFromPoint(x,y);
    return el && el.closest ? el.closest('[data-drop-action]') : null;
  }

  function clearDropHot(){ dropButtons.forEach(btn => btn.classList.remove('drop-hot')); }

  function updateDropHot(x,y){
    clearDropHot();
    const btn = dropButtonAt(x,y);
    if (btn) btn.classList.add('drop-hot');
    return btn;
  }

  function createTrail(items){
    items.forEach(({item,x,y}) => {
      const el = document.createElement('div');
      el.className = `afterimage ${item.type}`;
      el.style.setProperty('--x', `${x}px`);
      el.style.setProperty('--y', `${y}px`);
      el.innerHTML = `<span>${labels[item.type]}</span>`;
      fxLayer.appendChild(el);
      el.addEventListener('animationend', () => el.remove(), { once:true });
    });
  }

  function mergeGroups(baseItems){
    const groups = [];
    for (const type of ['one','ten']) {
      const arr = baseItems.filter(b => b.type === type).sort(sortByPlace);
      for (let i=0;i+9<arr.length;i+=10) groups.push({ type, group:arr.slice(i,i+10), newType:higher[type] });
    }
    return groups;
  }

  function mergeSelection(skipSave=false){
    if (busy) return false;
    const base = selected.size ? selectedBlocks() : [...blocks.values()];
    let groups = mergeGroups(base);
    if (!groups.length && selected.size) groups = mergeGroups([...blocks.values()]);
    if (!groups.length) { pulse(mergeBtn); return false; }
    busy = true;
    setMode('move');
    if (!skipSave) saveState();
    const removeIds = new Set();
    const creates = [];
    groups.forEach(({group,newType}) => {
      group.forEach(b => removeIds.add(b.id));
      const c = averageCenter(group);
      creates.push({ type:newType, x:c.x, y:c.y });
    });
    selected.clear();
    removeIds.forEach(id => {
      const b = blocks.get(id);
      if (!b) return;
      b.el.classList.remove('selected','dragging');
      b.el.style.zIndex = topZ++;
      b.el.classList.add('fold-out');
    });
    setTimeout(() => {
      removeIds.forEach(id => { const b = blocks.get(id); if (b) { b.el.remove(); blocks.delete(id); } });
      creates.forEach((p,i) => {
        const b = addBlock(p.type,p.x,p.y,{ center:true, select:false });
        selected.add(b.id);
        setTimeout(() => sparkle(centerOf(b).x, centerOf(b).y), i*35);
      });
      updateSelection();
      pulse(mergeBtn);
      busy = false;
    }, 250);
    return true;
  }

  function expandedPositions(childType,centerX,centerY,index=0){
    const d = blockSize(childType);
    const gap = Math.max(8, (parseFloat(getComputedStyle(stage).getPropertyValue('--u')) || 54)*.16);
    const inset = safeInsets();
    const usableW = stage.clientWidth - inset.left - inset.right;
    const maxCols = Math.max(2, Math.floor((usableW + gap)/(d.w + gap)));
    const cols = Math.min(5,maxCols);
    const rows = Math.ceil(10/cols);
    const totalW = cols*d.w + (cols-1)*gap;
    const totalH = rows*d.h + (rows-1)*gap;
    const offset = index * 10;
    const startX = clamp(centerX-totalW/2+offset, inset.left, stage.clientWidth-inset.right-totalW);
    const startY = clamp(centerY-totalH/2+offset, inset.top, stage.clientHeight-inset.bottom-totalH);
    const list = [];
    for (let i=0;i<10;i++) list.push(clampPos(childType, startX+(i%cols)*(d.w+gap), startY+Math.floor(i/cols)*(d.h+gap)));
    return list;
  }

  function splitSelection(skipSave=false){
    if (busy) return false;
    let targets = selectedBlocks().filter(b => b.type === 'ten' || b.type === 'hundred');
    if (!targets.length && lastActiveId) {
      const b = blocks.get(lastActiveId);
      if (b && (b.type === 'ten' || b.type === 'hundred')) targets = [b];
    }
    if (!targets.length) { pulse(splitBtn); return false; }
    busy = true;
    setMode('move');
    if (!skipSave) saveState();
    const removeIds = new Set(targets.map(b => b.id));
    const creates = [];
    targets.forEach((b,idx) => {
      const c = centerOf(b);
      const childType = lower[b.type];
      expandedPositions(childType,c.x,c.y,idx).forEach(p => creates.push({ type:childType, x:p.x, y:p.y }));
      sparkle(c.x,c.y);
      b.el.classList.remove('selected','dragging');
      b.el.classList.add('fade-out');
    });
    selected.clear();
    setTimeout(() => {
      removeIds.forEach(id => { const b = blocks.get(id); if (b) { b.el.remove(); blocks.delete(id); } });
      creates.forEach((p,i) => setTimeout(() => {
        const b = addBlock(p.type,p.x,p.y,{ select:false });
        selected.add(b.id);
        updateSelection();
      }, i*14));
      setTimeout(() => { pulse(splitBtn); busy = false; }, 190 + creates.length*14);
    }, 180);
    return true;
  }

  function deleteSelection(skipSave=false){
    if (busy) return false;
    let targets = selectedBlocks();
    if (!targets.length && lastActiveId) {
      const b = blocks.get(lastActiveId);
      if (b) targets = [b];
    }
    if (!targets.length) { pulse(deleteBtn); return false; }
    busy = true;
    setMode('move');
    if (!skipSave) saveState();
    targets.forEach(b => {
      b.el.classList.remove('selected','dragging');
      b.el.classList.add('fade-out');
      const c = centerOf(b);
      sparkle(c.x,c.y);
    });
    const ids = new Set(targets.map(b => b.id));
    selected.clear();
    setTimeout(() => {
      ids.forEach(id => { const b=blocks.get(id); if (b) { b.el.remove(); blocks.delete(id); } });
      pulse(deleteBtn);
      busy = false;
    }, 240);
    return true;
  }

  function runDropAction(action,skipSave=true){
    if (action === 'merge') mergeSelection(skipSave);
    if (action === 'split') splitSelection(skipSave);
    if (action === 'delete') deleteSelection(skipSave);
  }

  function onBlockPointerDown(ev){
    if (mode !== 'move' || busy) return;
    ev.preventDefault();
    ev.stopPropagation();
    const b = blocks.get(Number(ev.currentTarget.dataset.id));
    if (!b) return;
    lastActiveId = b.id;
    const pointerId = ev.pointerId;
    const wasSelected = selected.has(b.id);
    const sx = ev.clientX, sy = ev.clientY;
    let moved = false, saved = false;
    let dragItems = [], starts = [];
    b.el.setPointerCapture(pointerId);

    function startDrag(){
      if (moved) return;
      moved = true;
      if (!wasSelected) { selected.clear(); selected.add(b.id); updateSelection(); }
      dragItems = selectedBlocks();
      starts = dragItems.map(item => ({ item, x:item.x, y:item.y }));
      createTrail(starts);
      saveState();
      saved = true;
      dragItems.forEach(item => {
        item.z = topZ++;
        item.el.classList.add('dragging');
        positionBlock(item);
      });
    }

    function move(e){
      const dx = e.clientX - sx;
      const dy = e.clientY - sy;
      if (!moved && Math.hypot(dx,dy) > 5) startDrag();
      if (!moved) return;
      starts.forEach(({item,x,y}) => {
        const pos = clampPos(item.type, x+dx, y+dy);
        item.x = pos.x; item.y = pos.y;
        positionBlock(item);
      });
      updateDropHot(e.clientX,e.clientY);
    }

    function up(e){
      b.el.removeEventListener('pointermove', move);
      b.el.removeEventListener('pointerup', up);
      b.el.removeEventListener('pointercancel', up);
      try { b.el.releasePointerCapture(pointerId); } catch(_e) {}
      const dropBtn = moved ? updateDropHot(e.clientX,e.clientY) : null;
      clearDropHot();
      if (moved) {
        dragItems.forEach(item => item.el.classList.remove('dragging'));
        if (dropBtn) runDropAction(dropBtn.dataset.dropAction, saved);
        return;
      }
      if (wasSelected) selected.delete(b.id);
      else selected.add(b.id);
      b.z = topZ++;
      positionBlock(b);
      updateSelection();
    }

    b.el.addEventListener('pointermove', move);
    b.el.addEventListener('pointerup', up);
    b.el.addEventListener('pointercancel', up);
  }

  let marquee = null;

  function normalizedMarquee(){
    const l = Math.min(marquee.x0,marquee.x1), t = Math.min(marquee.y0,marquee.y1);
    const w = Math.abs(marquee.x1-marquee.x0), h = Math.abs(marquee.y1-marquee.y0);
    return { left:l, top:t, right:l+w, bottom:t+h, width:w, height:h };
  }

  function updateMarquee(){
    if (!marquee) return;
    const m = normalizedMarquee();
    selectionBox.style.display = 'block';
    selectionBox.style.left = `${m.left}px`;
    selectionBox.style.top = `${m.top}px`;
    selectionBox.style.width = `${m.width}px`;
    selectionBox.style.height = `${m.height}px`;
  }

  function selectByMarquee(){
    const m = normalizedMarquee();
    selected.clear();
    blocks.forEach(b => {
      const s = blockSize(b.type);
      const r = { left:b.x, top:b.y, right:b.x+s.w, bottom:b.y+s.h };
      if (r.left < m.right && r.right > m.left && r.top < m.bottom && r.bottom > m.top) selected.add(b.id);
    });
    updateSelection();
  }

  function leaveSelectionAfter(){
    if (!marquee || !marquee.moved) return;
    const m = normalizedMarquee();
    if (m.width < 8 || m.height < 8) return;
    const el = document.createElement('div');
    el.className = 'selection-after';
    el.style.left = `${m.left}px`;
    el.style.top = `${m.top}px`;
    el.style.width = `${m.width}px`;
    el.style.height = `${m.height}px`;
    fxLayer.appendChild(el);
    el.addEventListener('animationend', () => el.remove(), { once:true });
  }

  stage.addEventListener('pointerdown', ev => {
    if (mode !== 'move' || busy) return;
    if (ev.target.closest && ev.target.closest('.block,.toolbar,.palette')) return;
    ev.preventDefault();
    const p = localPoint(ev);
    marquee = { pointerId:ev.pointerId, x0:p.x, y0:p.y, x1:p.x, y1:p.y, moved:false };
    selected.clear(); updateSelection(); updateMarquee();
    stage.setPointerCapture(ev.pointerId);
  });

  stage.addEventListener('pointermove', ev => {
    if (!marquee || ev.pointerId !== marquee.pointerId) return;
    const p = localPoint(ev);
    marquee.x1 = clamp(p.x,0,stage.clientWidth);
    marquee.y1 = clamp(p.y,0,stage.clientHeight);
    marquee.moved = marquee.moved || Math.hypot(marquee.x1-marquee.x0,marquee.y1-marquee.y0) > 5;
    updateMarquee();
    if (marquee.moved) selectByMarquee();
  });

  stage.addEventListener('pointerup', ev => {
    if (!marquee || ev.pointerId !== marquee.pointerId) return;
    try { stage.releasePointerCapture(ev.pointerId); } catch(_e) {}
    leaveSelectionAfter();
    if (!marquee.moved) clearSelection();
    selectionBox.style.display = 'none';
    marquee = null;
  });

  function onStampPointerDown(ev){
    if (mode !== 'move') setMode(mode);
    setMode('move');
    ev.preventDefault();
    const type = ev.currentTarget.dataset.type;
    const sx = ev.clientX, sy = ev.clientY;
    let moved = false, ghost = null;

    function makeGhost(x,y){
      ghost = document.createElement('div');
      ghost.className = `ghost ${type}`;
      ghost.innerHTML = `<span>${labels[type]}</span>`;
      document.body.appendChild(ghost);
      moveGhost(x,y);
    }

    function moveGhost(x,y){ if (ghost) { ghost.style.left = `${x}px`; ghost.style.top = `${y}px`; } }

    function move(e){
      const d = Math.hypot(e.clientX-sx,e.clientY-sy);
      if (!moved && d > 5) { moved = true; makeGhost(e.clientX,e.clientY); }
      if (moved) moveGhost(e.clientX,e.clientY);
    }

    function up(e){
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      if (ghost) ghost.remove();
      saveState();
      clearSelection();
      if (!moved) {
        const p = nextPosition(type);
        addBlock(type,p.x,p.y,{ select:true });
      } else {
        const p = localPoint(e);
        const target = document.elementFromPoint(e.clientX,e.clientY);
        const onControl = target && target.closest && target.closest('.toolbar,.palette');
        if (p.inside && !onControl) addBlock(type,p.x,p.y,{ center:true, select:true });
        else history.pop();
      }
      updateUndo();
    }

    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up, { once:true });
  }

  stamps.forEach(btn => btn.addEventListener('pointerdown', onStampPointerDown));

  let drawing = false;
  let lastPoint = null;
  let savedDraw = false;

  function drawLine(ev){
    const p = localPoint(ev);
    if (!lastPoint) lastPoint = p;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(lastPoint.x,lastPoint.y);
    ctx.lineTo(p.x,p.y);
    if (mode === 'pen') {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = 'rgba(29,38,53,.92)';
      ctx.lineWidth = 4.2;
    } else if (mode === 'high') {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = 'rgba(255,232,68,.42)';
      ctx.lineWidth = 22;
    } else if (mode === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)';
      ctx.lineWidth = 34;
    }
    ctx.stroke();
    ctx.restore();
    lastPoint = p;
  }

  canvas.addEventListener('pointerdown', ev => {
    if (!(mode === 'pen' || mode === 'high' || mode === 'eraser')) return;
    ev.preventDefault();
    drawing = true;
    lastPoint = localPoint(ev);
    savedDraw = true;
    saveState();
    canvas.setPointerCapture(ev.pointerId);
    drawLine(ev);
  });

  canvas.addEventListener('pointermove', ev => {
    if (!drawing) return;
    ev.preventDefault();
    drawLine(ev);
  });

  function stopDrawing(ev){
    if (!drawing) return;
    drawing = false;
    lastPoint = null;
    savedDraw = false;
    try { canvas.releasePointerCapture(ev.pointerId); } catch(_e) {}
  }
  canvas.addEventListener('pointerup', stopDrawing);
  canvas.addEventListener('pointercancel', stopDrawing);

  undoBtn.addEventListener('click', undo);
  mergeBtn.addEventListener('click', () => mergeSelection(false));
  splitBtn.addEventListener('click', () => splitSelection(false));
  deleteBtn.addEventListener('click', () => deleteSelection(false));
  penBtn.addEventListener('click', () => setMode('pen'));
  highBtn.addEventListener('click', () => setMode('high'));
  eraserBtn.addEventListener('click', () => setMode('eraser'));
  fullBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      const target = document.documentElement;
      if (target.requestFullscreen) target.requestFullscreen().catch(()=>{});
    } else if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
    pulse(fullBtn);
  });

  window.addEventListener('resize', () => {
    fitUnit();
    blocks.forEach(b => { const p = clampPos(b.type,b.x,b.y); b.x=p.x; b.y=p.y; positionBlock(b); });
    updateCanvasSize(true);
  });

  fitUnit();
  updateCanvasSize(false);
  updateUndo();
})();
</script>
</body>
</html>
