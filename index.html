<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>십진 모형 놀이</title>
<style>
  :root{
    --u:52px;
    --ink:#20283a;
    --soft:#687188;
    --panel:rgba(255,255,255,.78);
    --panel2:rgba(255,255,255,.92);
    --line:rgba(96,78,130,.16);
    --one:#ffd5e0;
    --one2:#ffc0cf;
    --one-border:#ff7192;
    --ten:#9eeefa;
    --ten2:#7bdde9;
    --ten-border:#2eb4ca;
    --hundred:#d0f6c7;
    --hundred2:#b8edae;
    --hundred-border:#65bf5a;
    --yellow:#ffe86f;
    --purple:#8b72ff;
    --shadow:0 20px 54px rgba(58,49,86,.13), 0 7px 18px rgba(58,49,86,.08);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;color:var(--ink);font-family:ui-rounded,"Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:
    radial-gradient(circle at 10% 8%, rgba(255,232,111,.44), transparent 28%),
    radial-gradient(circle at 88% 10%, rgba(148,235,250,.40), transparent 30%),
    radial-gradient(circle at 14% 92%, rgba(255,196,212,.34), transparent 31%),
    radial-gradient(circle at 88% 88%, rgba(197,245,188,.38), transparent 33%),
    linear-gradient(135deg,#fffdf6 0%,#f3fbff 52%,#fff7fb 100%);
  }
  button{font:inherit;border:0;background:none;padding:0;cursor:pointer;user-select:none;touch-action:none}

  #app{position:fixed;inset:0;overflow:hidden}
  #stage{position:absolute;inset:10px;overflow:hidden;border-radius:34px;background:
    linear-gradient(rgba(255,255,255,.76),rgba(255,255,255,.58)),
    radial-gradient(circle at 18% 20%, rgba(142,230,244,.24), transparent 38%),
    radial-gradient(circle at 82% 18%, rgba(255,188,207,.22), transparent 36%),
    radial-gradient(circle at 68% 88%, rgba(211,248,196,.24), transparent 38%);
    border:1px solid rgba(126,105,170,.16);box-shadow:var(--shadow);touch-action:none;
  }
  #stage::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.22;background-image:radial-gradient(circle, rgba(93,81,123,.24) 1.2px, transparent 1.5px);background-size:30px 30px;mask-image:linear-gradient(to bottom,transparent 0,#000 7%,#000 93%,transparent 100%)}
  #ink{position:absolute;z-index:90;inset:0;width:100%;height:100%;pointer-events:none;touch-action:none;cursor:crosshair}
  #ink.active{pointer-events:auto}

  .toolbar{position:absolute;z-index:180;left:50%;top:max(12px,env(safe-area-inset-top));transform:translateX(-50%);display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:999px;background:var(--panel);backdrop-filter:blur(18px) saturate(1.25);-webkit-backdrop-filter:blur(18px) saturate(1.25);border:1px solid rgba(126,105,170,.15);box-shadow:0 16px 38px rgba(58,49,86,.14),inset 0 1px 0 rgba(255,255,255,.85);max-width:calc(100vw - 18px);overflow:auto;scrollbar-width:none}
  .toolbar::-webkit-scrollbar{display:none}
  .tool-btn{position:relative;width:46px;height:46px;flex:0 0 auto;border-radius:17px;background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,255,255,.76));color:#263047;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;box-shadow:inset 0 0 0 1px rgba(82,70,125,.10),0 7px 16px rgba(61,51,86,.10);transition:transform .18s cubic-bezier(.2,1.3,.35,1),box-shadow .18s ease,background .18s ease,filter .18s ease}
  .tool-btn:hover{transform:translateY(-2px) rotate(-1deg);box-shadow:inset 0 0 0 1px rgba(82,70,125,.15),0 12px 22px rgba(61,51,86,.14)}
  .tool-btn:active{transform:scale(.94)}
  .tool-btn.active{background:linear-gradient(180deg,#fff8bd,#fff2a0);box-shadow:0 0 0 4px rgba(255,226,96,.25),inset 0 0 0 1px rgba(173,135,20,.22),0 10px 21px rgba(166,125,22,.14)}
  .tool-btn.drop-hot{transform:translateY(-4px) scale(1.07);background:linear-gradient(180deg,#f8f5ff,#ebe6ff);box-shadow:0 0 0 6px rgba(139,114,255,.16),inset 0 0 0 2px rgba(139,114,255,.30),0 14px 26px rgba(139,114,255,.20)}
  .tool-btn .ico{font-size:19px;line-height:1;filter:drop-shadow(0 1px 0 rgba(255,255,255,.9))}
  .tool-btn .txt{font-size:9.5px;font-weight:900;letter-spacing:-.09em;line-height:1;white-space:nowrap;margin-top:1px;color:#30384d}
  .tool-btn.icon-only .ico{font-size:24px}

  .palette{position:absolute;z-index:160;left:max(16px,env(safe-area-inset-left));top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:12px;border-radius:28px;background:rgba(255,255,255,.72);backdrop-filter:blur(18px) saturate(1.25);-webkit-backdrop-filter:blur(18px) saturate(1.25);border:1px solid rgba(126,105,170,.14);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.88)}
  .stamp{position:relative;display:grid;place-items:center;cursor:grab;touch-action:none;user-select:none;font-family:Georgia,"Times New Roman",serif;font-weight:800;color:#172238;transition:transform .2s cubic-bezier(.2,1.35,.36,1),filter .2s ease,box-shadow .2s ease}
  .stamp::after{content:"";position:absolute;right:8px;top:8px;width:12px;height:12px;border-radius:999px;background:rgba(255,255,255,.72);box-shadow:-5px 7px 0 -4px rgba(255,255,255,.86);pointer-events:none}
  .stamp:hover{transform:translateY(-4px) rotate(-1deg);filter:saturate(1.08)}
  .stamp:active{cursor:grabbing;transform:scale(.95)}
  .stamp.one{width:54px;height:54px;border-radius:14px;background:linear-gradient(145deg,var(--one),var(--one2));border:2px solid var(--one-border);font-size:28px;box-shadow:0 9px 19px rgba(255,113,146,.22)}
  .stamp.ten{width:78px;height:54px;border-radius:14px;border:2px solid var(--ten-border);font-size:27px;box-shadow:0 9px 19px rgba(46,180,202,.22);background-image:repeating-linear-gradient(90deg,rgba(34,145,165,.20) 0 1px,transparent 1px 10%),linear-gradient(145deg,var(--ten),var(--ten2))}
  .stamp.hundred{width:82px;height:82px;border-radius:17px;border:2px solid var(--hundred-border);font-size:27px;box-shadow:0 9px 19px rgba(101,191,90,.22);background-color:var(--hundred);background-image:linear-gradient(rgba(76,160,70,.22) 1px,transparent 1px),linear-gradient(90deg,rgba(76,160,70,.22) 1px,transparent 1px),linear-gradient(145deg,var(--hundred),var(--hundred2));background-size:10% 10%,10% 10%,100% 100%}

  .block{--x:0px;--y:0px;position:absolute;z-index:20;left:0;top:0;display:grid;place-items:center;transform:translate(var(--x),var(--y));user-select:none;touch-action:none;cursor:grab;font-family:Georgia,"Times New Roman",serif;font-weight:800;color:#172238;transition:box-shadow .18s ease,filter .18s ease;will-change:transform,opacity}
  .block:active{cursor:grabbing}
  .block.one{width:var(--u);height:var(--u);border-radius:13px;background:linear-gradient(145deg,var(--one),var(--one2));border:2px solid var(--one-border);font-size:calc(var(--u)*.50);box-shadow:0 8px 18px rgba(255,113,146,.21),inset 0 1px 0 rgba(255,255,255,.68)}
  .block.ten{width:calc(var(--u)*1.20);height:var(--u);border-radius:13px;border:2px solid var(--ten-border);font-size:calc(var(--u)*.50);box-shadow:0 8px 18px rgba(46,180,202,.21),inset 0 1px 0 rgba(255,255,255,.68);background-image:repeating-linear-gradient(90deg,rgba(34,145,165,.20) 0 1px,transparent 1px 10%),linear-gradient(145deg,var(--ten),var(--ten2))}
  .block.hundred{width:calc(var(--u)*1.58);height:calc(var(--u)*1.58);border-radius:16px;border:2px solid var(--hundred-border);font-size:calc(var(--u)*.46);box-shadow:0 9px 20px rgba(101,191,90,.21),inset 0 1px 0 rgba(255,255,255,.68);background-color:var(--hundred);background-image:linear-gradient(rgba(76,160,70,.22) 1px,transparent 1px),linear-gradient(90deg,rgba(76,160,70,.22) 1px,transparent 1px),linear-gradient(145deg,var(--hundred),var(--hundred2));background-size:10% 10%,10% 10%,100% 100%}
  .block.selected{filter:saturate(1.15);box-shadow:0 0 0 4px rgba(255,226,96,.62),0 12px 24px rgba(53,46,78,.18),inset 0 1px 0 rgba(255,255,255,.72)}
  .block.dragging{filter:saturate(1.18);transition:none;transform:translate(var(--x),var(--y)) scale(1.035);box-shadow:0 21px 42px rgba(51,43,72,.22),0 0 0 4px rgba(139,114,255,.30),inset 0 1px 0 rgba(255,255,255,.74)}
  .block.pop-in{animation:popIn .35s cubic-bezier(.18,1.45,.38,1)}
  .block.fade-out{pointer-events:none;animation:fadeOut .24s ease forwards}
  .block.fold-out{pointer-events:none;animation:foldOut .28s cubic-bezier(.68,0,.8,.2) forwards}

  .burst{position:absolute;z-index:95;width:12px;height:12px;border-radius:999px;pointer-events:none;background:rgba(255,226,96,.96);box-shadow:0 0 0 0 rgba(255,226,96,.45);animation:burst .56s ease-out forwards}
  .ghost{position:fixed;z-index:220;pointer-events:none;display:grid;place-items:center;opacity:.80;transform:translate(-50%,-50%) scale(1.04);font-family:Georgia,"Times New Roman",serif;font-weight:800;color:#172238;filter:drop-shadow(0 14px 18px rgba(48,40,70,.20))}
  .ghost.one{width:54px;height:54px;border-radius:14px;background:linear-gradient(145deg,var(--one),var(--one2));border:2px solid var(--one-border);font-size:28px}
  .ghost.ten{width:78px;height:54px;border-radius:14px;border:2px solid var(--ten-border);font-size:27px;background-image:repeating-linear-gradient(90deg,rgba(34,145,165,.20) 0 1px,transparent 1px 10%),linear-gradient(145deg,var(--ten),var(--ten2))}
  .ghost.hundred{width:82px;height:82px;border-radius:17px;border:2px solid var(--hundred-border);font-size:27px;background-color:var(--hundred);background-image:linear-gradient(rgba(76,160,70,.22) 1px,transparent 1px),linear-gradient(90deg,rgba(76,160,70,.22) 1px,transparent 1px),linear-gradient(145deg,var(--hundred),var(--hundred2));background-size:10% 10%,10% 10%,100% 100%}

  @keyframes popIn{0%{opacity:0;transform:translate(var(--x),var(--y)) scale(.58) rotate(-5deg)}70%{opacity:1;transform:translate(var(--x),var(--y)) scale(1.08) rotate(1deg)}100%{opacity:1;transform:translate(var(--x),var(--y)) scale(1) rotate(0)}}
  @keyframes fadeOut{to{opacity:0;transform:translate(var(--x),var(--y)) scale(.68) rotate(6deg)}}
  @keyframes foldOut{to{opacity:0;transform:translate(var(--x),var(--y)) scale(.16);filter:blur(1px)}}
  @keyframes burst{0%{opacity:.95;transform:translate(-50%,-50%) scale(.5);box-shadow:0 0 0 0 rgba(255,226,96,.54)}80%{opacity:.55;box-shadow:0 0 0 36px rgba(255,226,96,0)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.55)}}

  @media (max-width:720px){
    #stage{inset:7px;border-radius:26px}.toolbar{top:8px;gap:5px;padding:6px}.tool-btn{width:42px;height:44px;border-radius:15px}.tool-btn .ico{font-size:17px}.tool-btn.icon-only .ico{font-size:22px}.tool-btn .txt{font-size:8.5px}.palette{left:9px;gap:9px;padding:9px;border-radius:23px}.stamp.one{width:48px;height:48px}.stamp.ten{width:66px;height:48px}.stamp.hundred{width:70px;height:70px}
  }
  @media (max-height:520px){
    .toolbar{top:7px}.palette{gap:8px;padding:8px}.stamp.one{width:46px;height:46px}.stamp.ten{width:64px;height:46px}.stamp.hundred{width:66px;height:66px}.tool-btn{height:42px}
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage" aria-label="십진 모형 활동판">
    <canvas id="ink"></canvas>
  </div>

  <div class="toolbar" aria-label="도구">
    <button class="tool-btn" id="undoBtn" aria-label="되돌리기" title="되돌리기"><span class="ico">↶</span><span class="txt">되돌리기</span></button>
    <button class="tool-btn" id="mergeBtn" data-drop-action="merge" aria-label="합치기" title="합치기"><span class="ico">🧲</span><span class="txt">합치기</span></button>
    <button class="tool-btn" id="splitBtn" data-drop-action="split" aria-label="쪼개기" title="쪼개기"><span class="ico">✂️</span><span class="txt">쪼개기</span></button>
    <button class="tool-btn" id="deleteBtn" data-drop-action="delete" aria-label="삭제" title="삭제"><span class="ico">🧹</span><span class="txt">삭제</span></button>
    <button class="tool-btn icon-only" id="penBtn" aria-label="펜" title="펜"><span class="ico">✏️</span></button>
    <button class="tool-btn icon-only" id="highBtn" aria-label="형광펜" title="형광펜"><span class="ico">🖍️</span></button>
    <button class="tool-btn icon-only" id="fullBtn" aria-label="전체화면" title="전체화면"><span class="ico">⛶</span></button>
  </div>

  <div class="palette" aria-label="모형 추가">
    <button class="stamp hundred" data-type="hundred" aria-label="백모형">100</button>
    <button class="stamp ten" data-type="ten" aria-label="십모형">10</button>
    <button class="stamp one" data-type="one" aria-label="일모형">1</button>
  </div>
</div>

<script>
(() => {
  const app = document.getElementById('app');
  const stage = document.getElementById('stage');
  const ink = document.getElementById('ink');
  const ctx = ink.getContext('2d');
  const undoBtn = document.getElementById('undoBtn');
  const mergeBtn = document.getElementById('mergeBtn');
  const splitBtn = document.getElementById('splitBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const penBtn = document.getElementById('penBtn');
  const highBtn = document.getElementById('highBtn');
  const fullBtn = document.getElementById('fullBtn');
  const stamps = [...document.querySelectorAll('.stamp')];
  const dropButtons = [...document.querySelectorAll('[data-drop-action]')];

  let blocks = new Map();
  let nextId = 1;
  let topZ = 24;
  let lastActiveId = null;
  let tool = 'move';
  let busy = false;
  let autoIndex = 0;
  let history = [];
  let dpr = Math.max(1, window.devicePixelRatio || 1);

  const label = { one:'1', ten:'10', hundred:'100' };
  const higher = { one:'ten', ten:'hundred' };
  const lower = { ten:'one', hundred:'ten' };

  function fitUnit(){
    const r = stage.getBoundingClientRect();
    const byW = r.width / 16;
    const byH = r.height / 9;
    const u = Math.max(34, Math.min(58, Math.floor(Math.min(byW, byH))));
    stage.style.setProperty('--u', `${u}px`);
  }

  function resizeInk(keep = true){
    const rect = stage.getBoundingClientRect();
    const old = document.createElement('canvas');
    const oldDpr = dpr;
    let oldW = 0, oldH = 0;
    if (keep && ink.width && ink.height) {
      old.width = ink.width;
      old.height = ink.height;
      old.getContext('2d').drawImage(ink, 0, 0);
      oldW = ink.width / oldDpr;
      oldH = ink.height / oldDpr;
    }
    dpr = Math.max(1, window.devicePixelRatio || 1);
    ink.width = Math.max(1, Math.round(rect.width * dpr));
    ink.height = Math.max(1, Math.round(rect.height * dpr));
    ink.style.width = `${rect.width}px`;
    ink.style.height = `${rect.height}px`;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (keep && old.width) ctx.drawImage(old, 0, 0, oldW, oldH, 0, 0, rect.width, rect.height);
  }

  function stagePoint(ev){
    const rect = stage.getBoundingClientRect();
    return {
      x: ev.clientX - rect.left,
      y: ev.clientY - rect.top,
      inside: ev.clientX >= rect.left && ev.clientX <= rect.right && ev.clientY >= rect.top && ev.clientY <= rect.bottom
    };
  }

  function blockSize(type){
    const u = parseFloat(getComputedStyle(stage).getPropertyValue('--u')) || 52;
    if (type === 'hundred') return { w:u*1.58, h:u*1.58 };
    if (type === 'ten') return { w:u*1.20, h:u };
    return { w:u, h:u };
  }

  function clamp(v, min, max){ return Math.min(Math.max(v, min), Math.max(min, max)); }
  function clampBlock(b){
    const s = blockSize(b.type);
    b.x = clamp(b.x, 3, stage.clientWidth - s.w - 3);
    b.y = clamp(b.y, 3, stage.clientHeight - s.h - 3);
  }
  function positionBlock(b){
    b.el.style.setProperty('--x', `${b.x}px`);
    b.el.style.setProperty('--y', `${b.y}px`);
    b.el.style.zIndex = b.z;
  }

  function addBlock(type, x, y, opt = {}){
    const id = opt.id ?? nextId++;
    const el = document.createElement('div');
    el.className = `block ${type}`;
    el.dataset.id = id;
    el.dataset.type = type;
    el.textContent = label[type];
    el.setAttribute('aria-label', label[type]);
    stage.insertBefore(el, ink);
    const s = blockSize(type);
    let bx = opt.center ? x - s.w/2 : x;
    let by = opt.center ? y - s.h/2 : y;
    const b = { id, type, x: bx, y: by, z: opt.z ?? topZ++, el };
    blocks.set(id, b);
    clampBlock(b);
    positionBlock(b);
    el.addEventListener('pointerdown', onBlockPointerDown);
    if (opt.selected) el.classList.add('selected');
    if (!opt.silent) {
      requestAnimationFrame(() => el.classList.add('pop-in'));
      el.addEventListener('animationend', () => el.classList.remove('pop-in'), { once:true });
    }
    nextId = Math.max(nextId, id + 1);
    topZ = Math.max(topZ, b.z + 1);
    return b;
  }

  function selectedBlocks(){ return [...blocks.values()].filter(b => b.el.classList.contains('selected')); }
  function clearSelection(){ blocks.forEach(b => b.el.classList.remove('selected')); }
  function snapshotBlocks(){
    return [...blocks.values()].map(b => ({ id:b.id, type:b.type, x:b.x, y:b.y, z:b.z, selected:b.el.classList.contains('selected') }));
  }
  function snapshotInk(){
    try { return ink.toDataURL('image/png'); } catch(e) { return ''; }
  }
  function saveState(){
    history.push({ blocks:snapshotBlocks(), ink:snapshotInk(), nextId, topZ, autoIndex });
    if (history.length > 70) history.shift();
  }
  function restoreInk(data){
    ctx.clearRect(0,0,stage.clientWidth,stage.clientHeight);
    if (!data) return;
    const img = new Image();
    img.onload = () => {
      ctx.clearRect(0,0,stage.clientWidth,stage.clientHeight);
      ctx.drawImage(img, 0, 0, stage.clientWidth, stage.clientHeight);
    };
    img.src = data;
  }
  function restoreState(state){
    [...stage.querySelectorAll('.block')].forEach(el => el.remove());
    blocks.clear();
    nextId = state.nextId || 1;
    topZ = state.topZ || 24;
    autoIndex = state.autoIndex || 0;
    state.blocks.forEach(item => addBlock(item.type, item.x, item.y, { id:item.id, z:item.z, selected:item.selected, silent:true }));
    restoreInk(state.ink);
  }
  function pulseButton(btn){
    btn.animate([{transform:'scale(1)'},{transform:'scale(.88)'},{transform:'scale(1)'}], {duration:220, easing:'ease-out'});
  }
  function undo(){
    if (!history.length) { pulseButton(undoBtn); return; }
    restoreState(history.pop());
    pulseButton(undoBtn);
  }

  function centerOf(b){
    const s = blockSize(b.type);
    return { x:b.x + s.w/2, y:b.y + s.h/2 };
  }
  function distance(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

  function findCluster(type, needed){
    const all = [...blocks.values()].filter(b => b.type === type && !b.el.classList.contains('fade-out') && !b.el.classList.contains('fold-out'));
    if (all.length < needed) return null;
    let best = null;
    let bestRadius = Infinity;
    for (const anchor of all) {
      const c = centerOf(anchor);
      const ordered = all.map(b => ({ b, d:distance(c, centerOf(b)) })).sort((a,b) => a.d - b.d);
      const group = ordered.slice(0, needed);
      const radius = group[group.length-1].d;
      if (radius < bestRadius) { bestRadius = radius; best = group.map(x => x.b); }
    }
    return best;
  }

  function pickMerge(){
    const selected = selectedBlocks();
    for (const type of ['one','ten']) {
      const selectedType = selected.filter(b => b.type === type);
      if (selectedType.length >= 10) return { group:selectedType.slice(0,10), newType:higher[type] };
    }
    for (const type of ['one','ten']) {
      const cluster = findCluster(type, 10);
      if (cluster) return { group:cluster, newType:higher[type] };
    }
    return null;
  }

  function burst(x,y){
    const dot = document.createElement('div');
    dot.className = 'burst';
    dot.style.left = `${x}px`;
    dot.style.top = `${y}px`;
    stage.appendChild(dot);
    dot.addEventListener('animationend', () => dot.remove(), { once:true });
  }

  function mergeBlocks(){
    if (busy) return;
    const picked = pickMerge();
    if (!picked) { pulseButton(mergeBtn); return; }
    busy = true;
    saveState();
    const centers = picked.group.map(centerOf);
    const cx = centers.reduce((a,p) => a+p.x,0) / centers.length;
    const cy = centers.reduce((a,p) => a+p.y,0) / centers.length;
    picked.group.forEach((b,i) => {
      b.el.classList.remove('selected','dragging');
      b.el.style.zIndex = topZ + i;
      b.el.classList.add('fold-out');
      setTimeout(() => { b.el.remove(); blocks.delete(b.id); }, 260);
    });
    setTimeout(() => {
      addBlock(picked.newType, cx, cy, { center:true });
      burst(cx, cy);
      busy = false;
    }, 250);
  }

  function targetsForSplit(){
    const selected = selectedBlocks().filter(b => b.type === 'hundred' || b.type === 'ten');
    if (selected.length) return selected;
    const active = blocks.get(lastActiveId);
    if (active && (active.type === 'hundred' || active.type === 'ten')) return [active];
    const firstHundred = [...blocks.values()].find(b => b.type === 'hundred');
    if (firstHundred) return [firstHundred];
    const firstTen = [...blocks.values()].find(b => b.type === 'ten');
    return firstTen ? [firstTen] : [];
  }

  function splitBlocks(){
    if (busy) return;
    const targets = targetsForSplit();
    if (!targets.length) { pulseButton(splitBtn); return; }
    busy = true;
    saveState();
    const spawn = [];
    targets.forEach((b, idx) => {
      const toType = lower[b.type];
      const fromSize = blockSize(b.type);
      const toSize = blockSize(toType);
      const gap = Math.max(7, (parseFloat(getComputedStyle(stage).getPropertyValue('--u')) || 52) * .14);
      const cols = 5;
      const rows = 2;
      const gridW = cols * toSize.w + (cols-1)*gap;
      const gridH = rows * toSize.h + (rows-1)*gap;
      const baseX = b.x + fromSize.w/2 - gridW/2 + idx*10;
      const baseY = b.y + fromSize.h/2 - gridH/2 + idx*10;
      for (let i=0;i<10;i++) spawn.push({ type:toType, x:baseX + (i%cols)*(toSize.w+gap), y:baseY + Math.floor(i/cols)*(toSize.h+gap) });
      b.el.classList.remove('selected','dragging');
      b.el.classList.add('fade-out');
      setTimeout(() => { b.el.remove(); blocks.delete(b.id); }, 220);
      burst(b.x + fromSize.w/2, b.y + fromSize.h/2);
    });
    setTimeout(() => {
      spawn.forEach((p,i) => setTimeout(() => addBlock(p.type, p.x, p.y), i*16));
      setTimeout(() => { busy = false; }, 260 + spawn.length*16);
    }, 160);
  }

  function targetsForDelete(){
    const selected = selectedBlocks();
    if (selected.length) return selected;
    const active = blocks.get(lastActiveId);
    return active ? [active] : [];
  }

  function deleteBlocks(){
    if (busy) return;
    const targets = targetsForDelete();
    if (!targets.length) { pulseButton(deleteBtn); return; }
    busy = true;
    saveState();
    targets.forEach((b,i) => {
      b.el.classList.remove('selected','dragging');
      b.el.style.zIndex = topZ + i;
      b.el.classList.add('fade-out');
      const c = centerOf(b);
      burst(c.x, c.y);
      setTimeout(() => { b.el.remove(); blocks.delete(b.id); }, 230);
    });
    setTimeout(() => { busy = false; }, 260);
  }

  function setTool(next){
    tool = (tool === next) ? 'move' : next;
    penBtn.classList.toggle('active', tool === 'pen');
    highBtn.classList.toggle('active', tool === 'high');
    ink.classList.toggle('active', tool === 'pen' || tool === 'high');
    stage.style.cursor = (tool === 'pen' || tool === 'high') ? 'crosshair' : 'default';
  }

  function dropButtonAt(x,y){
    const el = document.elementFromPoint(x,y);
    return el && el.closest ? el.closest('[data-drop-action]') : null;
  }
  function clearDropHot(){ dropButtons.forEach(btn => btn.classList.remove('drop-hot')); }
  function updateDropHot(x,y){
    clearDropHot();
    const btn = dropButtonAt(x,y);
    if (btn) btn.classList.add('drop-hot');
    return btn;
  }
  function runDropAction(action){
    if (action === 'merge') mergeBlocks();
    if (action === 'split') splitBlocks();
    if (action === 'delete') deleteBlocks();
  }

  function onBlockPointerDown(ev){
    if (tool !== 'move' || busy) return;
    ev.preventDefault();
    ev.stopPropagation();
    const el = ev.currentTarget;
    const b = blocks.get(Number(el.dataset.id));
    if (!b) return;
    lastActiveId = b.id;
    const pointerId = ev.pointerId;
    el.setPointerCapture(pointerId);
    const sx = ev.clientX;
    const sy = ev.clientY;
    let moved = false;
    let dragGroup = [];
    let starts = [];
    let saved = false;

    const startDrag = () => {
      if (moved) return;
      moved = true;
      if (!saved) { saveState(); saved = true; }
      if (!b.el.classList.contains('selected')) {
        clearSelection();
        b.el.classList.add('selected');
      }
      dragGroup = selectedBlocks();
      starts = dragGroup.map(item => ({ item, x:item.x, y:item.y }));
      dragGroup.forEach(item => {
        item.z = topZ++;
        item.el.classList.add('dragging');
        positionBlock(item);
      });
    };

    const move = e => {
      const dx = e.clientX - sx;
      const dy = e.clientY - sy;
      if (!moved && Math.hypot(dx,dy) > 4) startDrag();
      if (!moved) return;
      starts.forEach(({item,x,y}) => {
        const s = blockSize(item.type);
        item.x = clamp(x + dx, 3, stage.clientWidth - s.w - 3);
        item.y = clamp(y + dy, 3, stage.clientHeight - s.h - 3);
        positionBlock(item);
      });
      updateDropHot(e.clientX, e.clientY);
    };

    const up = e => {
      el.removeEventListener('pointermove', move);
      el.removeEventListener('pointerup', up);
      el.removeEventListener('pointercancel', up);
      try { el.releasePointerCapture(pointerId); } catch(_e) {}
      const dropBtn = moved ? updateDropHot(e.clientX, e.clientY) : null;
      clearDropHot();
      if (moved) {
        dragGroup.forEach(item => item.el.classList.remove('dragging'));
        if (dropBtn) setTimeout(() => runDropAction(dropBtn.dataset.dropAction), 0);
        return;
      }
      b.z = topZ++;
      positionBlock(b);
      b.el.classList.toggle('selected');
    };

    el.addEventListener('pointermove', move);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
  }

  stage.addEventListener('pointerdown', ev => {
    if (tool === 'move' && ev.target === stage) clearSelection();
  });

  let drawing = false;
  let last = null;
  function drawPoint(ev){
    const p = stagePoint(ev);
    if (!last) last = p;
    ctx.beginPath();
    ctx.moveTo(last.x, last.y);
    ctx.lineTo(p.x, p.y);
    ctx.globalCompositeOperation = 'source-over';
    if (tool === 'pen') {
      ctx.strokeStyle = 'rgba(29,38,53,.92)';
      ctx.lineWidth = 4.2;
    } else {
      ctx.strokeStyle = 'rgba(255,231,84,.42)';
      ctx.lineWidth = 24;
    }
    ctx.stroke();
    last = p;
  }
  ink.addEventListener('pointerdown', ev => {
    if (!(tool === 'pen' || tool === 'high')) return;
    ev.preventDefault();
    saveState();
    drawing = true;
    last = stagePoint(ev);
    ink.setPointerCapture(ev.pointerId);
    drawPoint(ev);
  });
  ink.addEventListener('pointermove', ev => {
    if (!drawing) return;
    ev.preventDefault();
    drawPoint(ev);
  });
  function endDraw(ev){
    if (!drawing) return;
    drawing = false;
    last = null;
    try { ink.releasePointerCapture(ev.pointerId); } catch(_e) {}
  }
  ink.addEventListener('pointerup', endDraw);
  ink.addEventListener('pointercancel', endDraw);

  function defaultSpot(type){
    const s = blockSize(type);
    const u = parseFloat(getComputedStyle(stage).getPropertyValue('--u')) || 52;
    const startX = Math.max(96, Math.round(stage.clientWidth * .14));
    const cols = Math.max(4, Math.floor((stage.clientWidth - startX - 34) / (u + 18)));
    const x = startX + (autoIndex % cols) * (u + 18);
    const y = stage.clientHeight - s.h - 28 - (Math.floor(autoIndex / cols) % 5) * (u + 18);
    autoIndex++;
    return { x: clamp(x, 4, stage.clientWidth - s.w - 4), y: clamp(y, 4, stage.clientHeight - s.h - 4) };
  }

  function preparePaletteDrag(stamp, ev){
    ev.preventDefault();
    const type = stamp.dataset.type;
    const startX = ev.clientX, startY = ev.clientY;
    let ghost = null;
    let dragged = false;
    stamp.setPointerCapture(ev.pointerId);

    const moveGhost = e => {
      if (!ghost) return;
      ghost.style.left = `${e.clientX}px`;
      ghost.style.top = `${e.clientY}px`;
    };
    const makeGhost = e => {
      ghost = document.createElement('div');
      ghost.className = `ghost ${type}`;
      ghost.textContent = label[type];
      document.body.appendChild(ghost);
      moveGhost(e);
    };
    const move = e => {
      if (!dragged && Math.hypot(e.clientX-startX, e.clientY-startY) > 5) {
        dragged = true;
        makeGhost(e);
      }
      if (dragged) moveGhost(e);
    };
    const up = e => {
      stamp.removeEventListener('pointermove', move);
      stamp.removeEventListener('pointerup', up);
      stamp.removeEventListener('pointercancel', up);
      try { stamp.releasePointerCapture(e.pointerId); } catch(_e) {}
      if (ghost) ghost.remove();
      const p = stagePoint(e);
      if (dragged && p.inside) {
        saveState();
        const s = blockSize(type);
        addBlock(type, p.x - s.w/2, p.y - s.h/2);
      } else if (!dragged) {
        saveState();
        const spot = defaultSpot(type);
        addBlock(type, spot.x, spot.y);
      }
      if (tool !== 'move') setTool(tool);
    };
    stamp.addEventListener('pointermove', move);
    stamp.addEventListener('pointerup', up);
    stamp.addEventListener('pointercancel', up);
  }

  stamps.forEach(stamp => stamp.addEventListener('pointerdown', ev => preparePaletteDrag(stamp, ev)));

  function clampAllBlocks(){ blocks.forEach(b => { clampBlock(b); positionBlock(b); }); }
  function debounce(fn, wait){ let t; return () => { clearTimeout(t); t = setTimeout(fn, wait); }; }

  undoBtn.addEventListener('click', undo);
  mergeBtn.addEventListener('click', mergeBlocks);
  splitBtn.addEventListener('click', splitBlocks);
  deleteBtn.addEventListener('click', deleteBlocks);
  penBtn.addEventListener('click', () => setTool('pen'));
  highBtn.addEventListener('click', () => setTool('high'));
  fullBtn.addEventListener('click', async () => {
    try {
      if (!document.fullscreenElement) await app.requestFullscreen();
      else await document.exitFullscreen();
      pulseButton(fullBtn);
      setTimeout(() => { fitUnit(); resizeInk(true); clampAllBlocks(); }, 120);
    } catch(_e) { pulseButton(fullBtn); }
  });

  window.addEventListener('resize', debounce(() => {
    fitUnit();
    resizeInk(true);
    clampAllBlocks();
  }, 120));

  document.addEventListener('keydown', ev => {
    if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === 'z') { ev.preventDefault(); undo(); }
    if (ev.key === 'Escape') setTool('move');
    if (ev.key === 'Delete' || ev.key === 'Backspace') deleteBlocks();
  });

  fitUnit();
  resizeInk(false);
})();
</script>
</body>
</html>
