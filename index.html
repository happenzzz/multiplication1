<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>십진 모형 놀이</title>
<style>
  :root{
    --u:54px;
    --ink:#223049;
    --soft:#6f7890;
    --panel:rgba(255,255,255,.78);
    --panel-strong:rgba(255,255,255,.92);
    --line:rgba(112,91,154,.16);
    --one:#ffd6e2;
    --one2:#ffc1d0;
    --one-border:#ff6f92;
    --ten:#96eaf5;
    --ten2:#75dbe8;
    --ten-border:#2db2c9;
    --hundred:#d4f7c9;
    --hundred2:#baefaf;
    --hundred-border:#63bd58;
    --purple:#8c76ff;
    --yellow:#ffe866;
    --shadow:0 20px 56px rgba(71,61,102,.13),0 7px 18px rgba(71,61,102,.08);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    margin:0;width:100%;height:100%;overflow:hidden;color:var(--ink);
    font-family:ui-rounded,"Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
    background:
      radial-gradient(circle at 10% 7%,rgba(255,231,118,.45),transparent 29%),
      radial-gradient(circle at 90% 9%,rgba(141,235,249,.38),transparent 31%),
      radial-gradient(circle at 12% 92%,rgba(255,192,213,.34),transparent 32%),
      radial-gradient(circle at 88% 90%,rgba(199,247,190,.38),transparent 34%),
      linear-gradient(135deg,#fffdf7 0%,#f2fbff 52%,#fff8fc 100%);
  }
  button{font:inherit;border:0;background:none;padding:0;cursor:pointer;user-select:none;touch-action:none;color:inherit}

  #app{position:fixed;inset:0;overflow:hidden}
  #stage{
    position:absolute;z-index:1;inset:8px;overflow:hidden;border-radius:34px;touch-action:none;
    background:
      linear-gradient(rgba(255,255,255,.82),rgba(255,255,255,.66)),
      radial-gradient(circle at 18% 20%,rgba(142,230,244,.23),transparent 39%),
      radial-gradient(circle at 82% 18%,rgba(255,188,207,.21),transparent 37%),
      radial-gradient(circle at 69% 88%,rgba(211,248,196,.24),transparent 39%);
    border:1px solid rgba(126,105,170,.15);box-shadow:var(--shadow);
  }
  #stage::before{
    content:"";position:absolute;inset:0;pointer-events:none;opacity:.16;
    background-image:radial-gradient(circle,rgba(93,81,123,.24) 1.15px,transparent 1.5px);
    background-size:32px 32px;
    mask-image:linear-gradient(to bottom,transparent 0,#000 8%,#000 92%,transparent 100%);
  }
  #blockLayer,#fxLayer{position:absolute;inset:0;pointer-events:none}
  #blockLayer{z-index:20}
  #fxLayer{z-index:115}
  #drawCanvas{position:absolute;z-index:80;inset:0;width:100%;height:100%;pointer-events:none;touch-action:none;cursor:crosshair}
  #drawCanvas.active{pointer-events:auto}

  .toolbar{
    position:absolute;z-index:190;left:50%;top:max(12px,env(safe-area-inset-top));transform:translateX(-50%);
    display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:999px;max-width:calc(100vw - 16px);
    overflow-x:auto;scrollbar-width:none;background:var(--panel);backdrop-filter:blur(18px) saturate(1.25);-webkit-backdrop-filter:blur(18px) saturate(1.25);
    border:1px solid rgba(126,105,170,.15);box-shadow:0 16px 38px rgba(58,49,86,.14),inset 0 1px 0 rgba(255,255,255,.88);
  }
  .toolbar::-webkit-scrollbar{display:none}
  .tool-btn{
    position:relative;width:54px;height:48px;flex:0 0 auto;border-radius:17px;
    background:linear-gradient(180deg,rgba(255,255,255,.97),rgba(255,255,255,.78));
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
    box-shadow:inset 0 0 0 1px rgba(82,70,125,.10),0 7px 16px rgba(61,51,86,.10);
    transition:transform .18s cubic-bezier(.2,1.3,.35,1),box-shadow .18s ease,background .18s ease,filter .18s ease;
  }
  .tool-btn:hover{transform:translateY(-2px) rotate(-1deg);box-shadow:inset 0 0 0 1px rgba(82,70,125,.15),0 12px 22px rgba(61,51,86,.14)}
  .tool-btn:active{transform:scale(.94)}
  .tool-btn.active{background:linear-gradient(180deg,#fff8bd,#fff2a0);box-shadow:0 0 0 4px rgba(255,226,96,.25),inset 0 0 0 1px rgba(173,135,20,.22),0 10px 21px rgba(166,125,22,.14)}
  .tool-btn.drop-hot{transform:translateY(3px) scale(1.08);background:linear-gradient(180deg,#f7f3ff,#ebe6ff);box-shadow:0 0 0 7px rgba(140,118,255,.18),inset 0 0 0 2px rgba(140,118,255,.32),0 14px 27px rgba(140,118,255,.21)}
  .tool-btn .ico{font-size:20px;line-height:1;filter:drop-shadow(0 1px 0 rgba(255,255,255,.9))}
  .tool-btn .txt{font-size:8.8px;font-weight:950;letter-spacing:-.08em;line-height:1;white-space:nowrap;color:#30384d;margin-top:1px}

  .palette{
    position:absolute;z-index:175;left:max(14px,env(safe-area-inset-left));top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column;align-items:center;gap:13px;padding:12px;border-radius:28px;
    background:rgba(255,255,255,.72);backdrop-filter:blur(18px) saturate(1.25);-webkit-backdrop-filter:blur(18px) saturate(1.25);
    border:1px solid rgba(126,105,170,.14);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.88);
  }
  .stamp{
    position:relative;display:grid;place-items:center;cursor:grab;touch-action:none;user-select:none;
    font-family:Georgia,"Times New Roman",serif;font-weight:850;color:#172238;
    transition:transform .2s cubic-bezier(.2,1.35,.36,1),filter .2s ease,box-shadow .2s ease;
  }
  .stamp::after,.block::after,.ghost::after{
    content:"";position:absolute;right:8px;top:8px;width:12px;height:12px;border-radius:999px;
    background:rgba(255,255,255,.70);box-shadow:-5px 7px 0 -4px rgba(255,255,255,.86);pointer-events:none;
  }
  .stamp:hover{transform:translateY(-4px) rotate(-1deg);filter:saturate(1.08)}
  .stamp:active{cursor:grabbing;transform:scale(.95)}
  .stamp.one{width:54px;height:54px;border-radius:14px;background:linear-gradient(145deg,var(--one),var(--one2));border:2px solid var(--one-border);font-size:28px;box-shadow:0 9px 19px rgba(255,113,146,.22)}
  .stamp.ten{width:78px;height:54px;border-radius:14px;background:linear-gradient(145deg,var(--ten),var(--ten2));border:2px solid var(--ten-border);font-size:27px;box-shadow:0 9px 19px rgba(46,180,202,.22)}
  .stamp.hundred{width:82px;height:82px;border-radius:17px;border:2px solid var(--hundred-border);font-size:27px;box-shadow:0 9px 19px rgba(101,191,90,.22);background-color:var(--hundred);background-image:linear-gradient(rgba(76,160,70,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(76,160,70,.18) 1px,transparent 1px),linear-gradient(145deg,var(--hundred),var(--hundred2));background-size:10% 10%,10% 10%,100% 100%}

  .block{
    --x:0px;--y:0px;position:absolute;left:0;top:0;z-index:20;display:grid;place-items:center;
    transform:translate(var(--x),var(--y));user-select:none;touch-action:none;pointer-events:auto;cursor:grab;
    font-family:Georgia,"Times New Roman",serif;font-weight:850;color:#172238;
    transition:box-shadow .18s ease,filter .18s ease;will-change:transform,opacity;
  }
  .block:active{cursor:grabbing}
  .block.one{width:var(--u);height:var(--u);border-radius:13px;background:linear-gradient(145deg,var(--one),var(--one2));border:2px solid var(--one-border);font-size:calc(var(--u)*.50);box-shadow:0 8px 18px rgba(255,113,146,.21),inset 0 1px 0 rgba(255,255,255,.68)}
  .block.ten{width:calc(var(--u)*1.28);height:var(--u);border-radius:13px;background:linear-gradient(145deg,var(--ten),var(--ten2));border:2px solid var(--ten-border);font-size:calc(var(--u)*.50);box-shadow:0 8px 18px rgba(46,180,202,.21),inset 0 1px 0 rgba(255,255,255,.68)}
  .block.hundred{width:calc(var(--u)*1.68);height:calc(var(--u)*1.68);border-radius:16px;border:2px solid var(--hundred-border);font-size:calc(var(--u)*.46);box-shadow:0 9px 20px rgba(101,191,90,.21),inset 0 1px 0 rgba(255,255,255,.68);background-color:var(--hundred);background-image:linear-gradient(rgba(76,160,70,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(76,160,70,.18) 1px,transparent 1px),linear-gradient(145deg,var(--hundred),var(--hundred2));background-size:10% 10%,10% 10%,100% 100%}
  .block.selected{filter:saturate(1.16) brightness(1.02);box-shadow:0 0 0 4px rgba(255,226,96,.64),0 12px 25px rgba(53,46,78,.18),inset 0 1px 0 rgba(255,255,255,.72)}
  .block.dragging{filter:saturate(1.18);transition:none;transform:translate(var(--x),var(--y)) scale(1.035);box-shadow:0 21px 42px rgba(51,43,72,.22),0 0 0 4px rgba(140,118,255,.30),inset 0 1px 0 rgba(255,255,255,.74)}
  .block.pop-in{animation:popIn .35s cubic-bezier(.18,1.45,.38,1)}
  .block.fade-out{pointer-events:none;animation:fadeOut .24s ease forwards}
  .block.fold-out{pointer-events:none;animation:foldOut .28s cubic-bezier(.68,0,.8,.2) forwards}

  .ghost{
    position:fixed;z-index:230;pointer-events:none;display:grid;place-items:center;opacity:.82;
    transform:translate(-50%,-50%) scale(1.04);font-family:Georgia,"Times New Roman",serif;font-weight:850;color:#172238;
    filter:drop-shadow(0 14px 18px rgba(48,40,70,.20));
  }
  .ghost.one{width:54px;height:54px;border-radius:14px;background:linear-gradient(145deg,var(--one),var(--one2));border:2px solid var(--one-border);font-size:28px}
  .ghost.ten{width:78px;height:54px;border-radius:14px;background:linear-gradient(145deg,var(--ten),var(--ten2));border:2px solid var(--ten-border);font-size:27px}
  .ghost.hundred{width:82px;height:82px;border-radius:17px;border:2px solid var(--hundred-border);font-size:27px;background-color:var(--hundred);background-image:linear-gradient(rgba(76,160,70,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(76,160,70,.18) 1px,transparent 1px),linear-gradient(145deg,var(--hundred),var(--hundred2));background-size:10% 10%,10% 10%,100% 100%}

  #selectionBox{
    position:absolute;z-index:112;display:none;pointer-events:none;border:2px solid rgba(140,118,255,.72);border-radius:22px;
    background:rgba(140,118,255,.12);box-shadow:0 0 0 6px rgba(140,118,255,.08),inset 0 1px 0 rgba(255,255,255,.58);
  }
  .selection-after{
    position:absolute;z-index:111;pointer-events:none;border:2px solid rgba(140,118,255,.44);border-radius:22px;
    background:rgba(140,118,255,.10);box-shadow:0 0 0 8px rgba(140,118,255,.08);animation:selectFade .78s ease-out forwards;
  }
  .afterimage{
    --x:0px;--y:0px;position:absolute;left:0;top:0;z-index:108;display:grid;place-items:center;pointer-events:none;
    transform:translate(var(--x),var(--y));font-family:Georgia,"Times New Roman",serif;font-weight:850;color:#172238;opacity:.32;filter:saturate(1.05);animation:trailFade .62s ease-out forwards;
  }
  .afterimage.one{width:var(--u);height:var(--u);border-radius:13px;background:linear-gradient(145deg,var(--one),var(--one2));border:2px solid var(--one-border);font-size:calc(var(--u)*.50)}
  .afterimage.ten{width:calc(var(--u)*1.28);height:var(--u);border-radius:13px;background:linear-gradient(145deg,var(--ten),var(--ten2));border:2px solid var(--ten-border);font-size:calc(var(--u)*.50)}
  .afterimage.hundred{width:calc(var(--u)*1.68);height:calc(var(--u)*1.68);border-radius:16px;border:2px solid var(--hundred-border);font-size:calc(var(--u)*.46);background-color:var(--hundred);background-image:linear-gradient(rgba(76,160,70,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(76,160,70,.18) 1px,transparent 1px),linear-gradient(145deg,var(--hundred),var(--hundred2));background-size:10% 10%,10% 10%,100% 100%}

  .spark{position:absolute;z-index:120;width:10px;height:10px;border-radius:999px;pointer-events:none;background:rgba(255,226,96,.98);box-shadow:0 0 0 5px rgba(255,255,255,.42);animation:sparkle .62s ease-out forwards}
  .ring{position:absolute;z-index:119;width:18px;height:18px;border-radius:999px;pointer-events:none;border:3px solid rgba(255,226,96,.88);animation:ring .62s ease-out forwards}

  @keyframes popIn{0%{opacity:0;transform:translate(var(--x),var(--y)) scale(.58) rotate(-5deg)}70%{opacity:1;transform:translate(var(--x),var(--y)) scale(1.08) rotate(1deg)}100%{opacity:1;transform:translate(var(--x),var(--y)) scale(1) rotate(0)}}
  @keyframes fadeOut{to{opacity:0;transform:translate(var(--x),var(--y)) scale(.68) rotate(6deg)}}
  @keyframes foldOut{to{opacity:0;transform:translate(var(--x),var(--y)) scale(.16);filter:blur(1px)}}
  @keyframes selectFade{0%{opacity:.85;transform:scale(1)}100%{opacity:0;transform:scale(1.035)}}
  @keyframes trailFade{0%{opacity:.32;transform:translate(var(--x),var(--y)) scale(1)}100%{opacity:0;transform:translate(var(--x),var(--y)) scale(1.08)}}
  @keyframes sparkle{0%{opacity:1;transform:translate(-50%,-50%) scale(.65)}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.08)}}
  @keyframes ring{0%{opacity:.9;transform:translate(-50%,-50%) scale(.4)}100%{opacity:0;transform:translate(-50%,-50%) scale(3.3)}}

  @media (max-width:760px){
    #stage{inset:6px;border-radius:27px}.toolbar{top:8px;gap:6px;padding:6px;justify-content:flex-start}.tool-btn{width:47px;height:45px;border-radius:15px}.tool-btn .ico{font-size:18px}.tool-btn .txt{font-size:7.8px}.palette{left:50%;top:auto;bottom:max(9px,env(safe-area-inset-bottom));transform:translateX(-50%);flex-direction:row;gap:10px;padding:9px;border-radius:25px}.stamp.one{width:48px;height:48px;font-size:25px}.stamp.ten{width:68px;height:48px;font-size:24px}.stamp.hundred{width:62px;height:62px;font-size:22px}
  }
  @media (max-height:520px){
    .toolbar{top:7px}.palette{gap:8px;padding:8px}.tool-btn{height:42px}.stamp.one{width:46px;height:46px}.stamp.ten{width:64px;height:46px}.stamp.hundred{width:60px;height:60px}
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage" aria-label="십진 모형 활동판">
    <div id="blockLayer"></div>
    <canvas id="drawCanvas"></canvas>
    <div id="selectionBox"></div>
    <div id="fxLayer"></div>
  </div>

  <div class="toolbar" aria-label="도구">
    <button class="tool-btn" id="undoBtn" aria-label="되돌리기" title="되돌리기"><span class="ico">↶</span><span class="txt">되돌리기</span></button>
    <button class="tool-btn" id="mergeBtn" data-drop-action="merge" aria-label="합치기" title="합치기"><span class="ico">🧲</span><span class="txt">합치기</span></button>
    <button class="tool-btn" id="splitBtn" data-drop-action="split" aria-label="쪼개기" title="쪼개기"><span class="ico">✂️</span><span class="txt">쪼개기</span></button>
    <button class="tool-btn" id="deleteBtn" data-drop-action="delete" aria-label="삭제" title="삭제"><span class="ico">🧺</span><span class="txt">삭제</span></button>
    <button class="tool-btn" id="penBtn" aria-label="펜" title="펜"><span class="ico">✏️</span><span class="txt">펜</span></button>
    <button class="tool-btn" id="highBtn" aria-label="형광펜" title="형광펜"><span class="ico">🖍️</span><span class="txt">형광펜</span></button>
    <button class="tool-btn" id="eraserBtn" aria-label="지우개" title="지우개"><span class="ico">🩹</span><span class="txt">지우개</span></button>
    <button class="tool-btn" id="fullBtn" aria-label="전체화면" title="전체화면"><span class="ico">⛶</span><span class="txt">전체</span></button>
  </div>

  <div class="palette" aria-label="모형 추가">
    <button class="stamp hundred" data-type="hundred" aria-label="백모형">100</button>
    <button class="stamp ten" data-type="ten" aria-label="십모형">10</button>
    <button class="stamp one" data-type="one" aria-label="일모형">1</button>
  </div>
</div>

<script>
(() => {
  const app = document.getElementById('app');
  const stage = document.getElementById('stage');
  const blockLayer = document.getElementById('blockLayer');
  const fxLayer = document.getElementById('fxLayer');
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  const selectionBox = document.getElementById('selectionBox');

  const undoBtn = document.getElementById('undoBtn');
  const mergeBtn = document.getElementById('mergeBtn');
  const splitBtn = document.getElementById('splitBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const penBtn = document.getElementById('penBtn');
  const highBtn = document.getElementById('highBtn');
  const eraserBtn = document.getElementById('eraserBtn');
  const fullBtn = document.getElementById('fullBtn');
  const stamps = [...document.querySelectorAll('.stamp')];
  const dropButtons = [...document.querySelectorAll('[data-drop-action]')];

  const labels = { one:'1', ten:'10', hundred:'100' };
  const higher = { one:'ten', ten:'hundred' };
  const lower = { ten:'one', hundred:'ten' };

  let blocks = new Map();
  let selected = new Set();
  let nextId = 1;
  let topZ = 30;
  let mode = 'select';
  let history = [];
  let dpr = Math.max(1, window.devicePixelRatio || 1);
  let autoIndex = 0;
  let lastActiveId = null;
  let busy = false;

  function clamp(v,min,max){ return Math.min(Math.max(v,min), Math.max(min,max)); }

  function fitUnit(){
    const r = stage.getBoundingClientRect();
    const u = Math.max(34, Math.min(56, Math.floor(Math.min(r.width / 16, r.height / 9))));
    stage.style.setProperty('--u', `${u}px`);
  }

  function resizeCanvas(keep = true){
    const rect = stage.getBoundingClientRect();
    const old = document.createElement('canvas');
    if (keep && canvas.width && canvas.height) {
      old.width = canvas.width;
      old.height = canvas.height;
      old.getContext('2d').drawImage(canvas, 0, 0);
    }
    dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.max(1, Math.round(rect.width * dpr));
    canvas.height = Math.max(1, Math.round(rect.height * dpr));
    canvas.style.width = `${rect.width}px`;
    canvas.style.height = `${rect.height}px`;
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if (keep && old.width) ctx.drawImage(old,0,0,old.width,old.height,0,0,canvas.width,canvas.height);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }

  function clearCanvas(){
    ctx.save();
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.restore();
  }

  function captureDrawing(){
    try { return canvas.toDataURL('image/png'); } catch(_e) { return ''; }
  }

  function restoreDrawing(data){
    clearCanvas();
    if (!data) return;
    const img = new Image();
    img.onload = () => {
      ctx.save();
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      ctx.restore();
    };
    img.src = data;
  }

  function blockSize(type){
    const u = parseFloat(getComputedStyle(stage).getPropertyValue('--u')) || 54;
    if (type === 'hundred') return { w:u*1.68, h:u*1.68 };
    if (type === 'ten') return { w:u*1.28, h:u };
    return { w:u, h:u };
  }

  function stagePoint(ev){
    const r = stage.getBoundingClientRect();
    return {
      x: ev.clientX - r.left,
      y: ev.clientY - r.top,
      inside: ev.clientX >= r.left && ev.clientX <= r.right && ev.clientY >= r.top && ev.clientY <= r.bottom
    };
  }

  function clampBlock(b){
    const s = blockSize(b.type);
    b.x = clamp(b.x, 3, stage.clientWidth - s.w - 3);
    b.y = clamp(b.y, 3, stage.clientHeight - s.h - 3);
  }

  function positionBlock(b){
    b.el.style.setProperty('--x', `${b.x}px`);
    b.el.style.setProperty('--y', `${b.y}px`);
    b.el.style.zIndex = b.z;
  }

  function setSelected(id, on){
    const b = blocks.get(id);
    if (!b) return;
    if (on) selected.add(id); else selected.delete(id);
    b.el.classList.toggle('selected', selected.has(id));
  }

  function clearSelection(){
    selected.forEach(id => {
      const b = blocks.get(id);
      if (b) b.el.classList.remove('selected');
    });
    selected.clear();
  }

  function selectedBlocks(){
    return [...selected].map(id => blocks.get(id)).filter(Boolean);
  }

  function snapshot(){
    return {
      blocks:[...blocks.values()].map(b => ({ id:b.id, type:b.type, x:b.x, y:b.y, z:b.z })),
      selected:[...selected],
      nextId, topZ, autoIndex,
      drawing:captureDrawing()
    };
  }

  function saveState(){
    history.push(snapshot());
    if (history.length > 80) history.shift();
  }

  function restoreState(state){
    blockLayer.querySelectorAll('.block').forEach(el => el.remove());
    fxLayer.innerHTML = '';
    blocks.clear();
    selected.clear();
    nextId = state.nextId || 1;
    topZ = state.topZ || 30;
    autoIndex = state.autoIndex || 0;
    state.blocks.forEach(item => addBlock(item.type, item.x, item.y, { id:item.id, z:item.z, silent:true }));
    (state.selected || []).forEach(id => setSelected(id, true));
    restoreDrawing(state.drawing);
  }

  function undo(){
    if (!history.length) { pulse(undoBtn); return; }
    const state = history.pop();
    restoreState(state);
    pulse(undoBtn);
  }

  function addBlock(type, x, y, opt = {}){
    const id = opt.id ?? nextId++;
    const el = document.createElement('div');
    el.className = `block ${type}`;
    el.dataset.id = id;
    el.dataset.type = type;
    el.textContent = labels[type];
    el.setAttribute('aria-label', labels[type]);
    blockLayer.appendChild(el);
    const s = blockSize(type);
    const b = { id, type, x: opt.center ? x - s.w/2 : x, y: opt.center ? y - s.h/2 : y, z: opt.z ?? topZ++, el };
    blocks.set(id, b);
    clampBlock(b);
    positionBlock(b);
    el.addEventListener('pointerdown', onBlockPointerDown);
    if (!opt.silent) {
      requestAnimationFrame(() => el.classList.add('pop-in'));
      el.addEventListener('animationend', () => el.classList.remove('pop-in'), { once:true });
    }
    nextId = Math.max(nextId, Number(id) + 1 || nextId);
    topZ = Math.max(topZ, b.z + 1);
    return b;
  }

  function defaultSpot(type){
    const s = blockSize(type);
    const u = parseFloat(getComputedStyle(stage).getPropertyValue('--u')) || 54;
    const topPad = Math.min(96, Math.max(68, u * 1.45));
    const sidePad = window.matchMedia('(max-width:760px)').matches ? 18 : 112;
    const cols = Math.max(2, Math.floor((stage.clientWidth - sidePad - 28) / (u + 22)));
    const x = sidePad + (autoIndex % cols) * (u + 22);
    const y = topPad + (Math.floor(autoIndex / cols) % Math.max(1, Math.floor((stage.clientHeight - topPad - 110) / (u + 22)))) * (u + 22);
    autoIndex++;
    return { x:clamp(x, 4, stage.clientWidth - s.w - 4), y:clamp(y, 4, stage.clientHeight - s.h - 4) };
  }

  function centerOf(b){
    const s = blockSize(b.type);
    return { x:b.x + s.w/2, y:b.y + s.h/2 };
  }

  function pulse(btn){
    btn.animate([{transform:'scale(1)'},{transform:'scale(.88)'},{transform:'scale(1)'}],{duration:230,easing:'ease-out'});
  }

  function sparkle(x,y){
    const ring = document.createElement('div');
    ring.className = 'ring';
    ring.style.left = `${x}px`;
    ring.style.top = `${y}px`;
    fxLayer.appendChild(ring);
    ring.addEventListener('animationend', () => ring.remove(), { once:true });
    for (let i=0;i<8;i++) {
      const dot = document.createElement('div');
      const angle = (Math.PI * 2 * i) / 8;
      const dist = 22 + Math.random() * 18;
      dot.className = 'spark';
      dot.style.left = `${x}px`;
      dot.style.top = `${y}px`;
      dot.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      dot.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
      fxLayer.appendChild(dot);
      dot.addEventListener('animationend', () => dot.remove(), { once:true });
    }
  }

  function leaveBlockAfterimage(items){
    items.slice(0,16).forEach(b => {
      const ghost = document.createElement('div');
      ghost.className = `afterimage ${b.type}`;
      ghost.textContent = labels[b.type];
      ghost.style.setProperty('--x', `${b.x}px`);
      ghost.style.setProperty('--y', `${b.y}px`);
      fxLayer.appendChild(ghost);
      ghost.addEventListener('animationend', () => ghost.remove(), { once:true });
    });
  }

  function leaveSelectionAfterimage(rect){
    if (rect.w < 12 || rect.h < 12) return;
    const el = document.createElement('div');
    el.className = 'selection-after';
    el.style.left = `${rect.x}px`;
    el.style.top = `${rect.y}px`;
    el.style.width = `${rect.w}px`;
    el.style.height = `${rect.h}px`;
    fxLayer.appendChild(el);
    el.addEventListener('animationend', () => el.remove(), { once:true });
  }

  function dropActionAt(clientX, clientY){
    for (const btn of dropButtons) {
      const r = btn.getBoundingClientRect();
      if (clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom) return btn.dataset.dropAction;
    }
    return '';
  }

  function updateDropHot(action){
    dropButtons.forEach(btn => btn.classList.toggle('drop-hot', btn.dataset.dropAction === action));
  }

  function onBlockPointerDown(ev){
    if (mode !== 'select' || busy) return;
    ev.preventDefault();
    ev.stopPropagation();
    const b = blocks.get(Number(ev.currentTarget.dataset.id));
    if (!b) return;
    lastActiveId = b.id;
    const pointerId = ev.pointerId;
    const startX = ev.clientX;
    const startY = ev.clientY;
    let moved = false;
    let saved = false;
    let dragGroup = [];
    let starts = [];
    let lastTrail = 0;
    b.el.setPointerCapture(pointerId);

    const beginDrag = () => {
      if (moved) return;
      moved = true;
      if (!selected.has(b.id)) {
        clearSelection();
        setSelected(b.id, true);
      }
      saveState();
      saved = true;
      dragGroup = selectedBlocks();
      starts = dragGroup.map(item => ({ item, x:item.x, y:item.y }));
      dragGroup.forEach(item => {
        item.z = topZ++;
        item.el.classList.add('dragging');
        positionBlock(item);
      });
      leaveBlockAfterimage(dragGroup);
    };

    const move = e => {
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      if (!moved && Math.hypot(dx,dy) > 5) beginDrag();
      if (!moved) return;
      starts.forEach(({item,x,y}) => {
        const s = blockSize(item.type);
        item.x = clamp(x + dx, 3, stage.clientWidth - s.w - 3);
        item.y = clamp(y + dy, 3, stage.clientHeight - s.h - 3);
        positionBlock(item);
      });
      const now = performance.now();
      if (now - lastTrail > 160) {
        lastTrail = now;
        leaveBlockAfterimage(dragGroup);
      }
      updateDropHot(dropActionAt(e.clientX, e.clientY));
    };

    const up = e => {
      b.el.removeEventListener('pointermove', move);
      b.el.removeEventListener('pointerup', up);
      b.el.removeEventListener('pointercancel', up);
      try { b.el.releasePointerCapture(pointerId); } catch(_e) {}
      updateDropHot('');
      if (moved) {
        dragGroup.forEach(item => item.el.classList.remove('dragging'));
        const action = dropActionAt(e.clientX, e.clientY);
        if (action === 'merge') mergeBlocks({ skipSave:saved });
        if (action === 'split') splitBlocks({ skipSave:saved });
        if (action === 'delete') deleteBlocks({ skipSave:saved });
        return;
      }
      b.z = topZ++;
      positionBlock(b);
      setSelected(b.id, !selected.has(b.id));
    };

    b.el.addEventListener('pointermove', move);
    b.el.addEventListener('pointerup', up);
    b.el.addEventListener('pointercancel', up);
  }

  function normalizedRect(a,b){
    const x = Math.min(a.x,b.x), y = Math.min(a.y,b.y);
    return { x, y, w:Math.abs(a.x-b.x), h:Math.abs(a.y-b.y) };
  }

  function setSelectionBox(rect){
    selectionBox.style.display = 'block';
    selectionBox.style.left = `${rect.x}px`;
    selectionBox.style.top = `${rect.y}px`;
    selectionBox.style.width = `${rect.w}px`;
    selectionBox.style.height = `${rect.h}px`;
  }

  function blocksInRect(rect){
    return [...blocks.values()].filter(b => {
      const c = centerOf(b);
      return c.x >= rect.x && c.x <= rect.x + rect.w && c.y >= rect.y && c.y <= rect.y + rect.h;
    });
  }

  stage.addEventListener('pointerdown', ev => {
    if (mode !== 'select' || busy) return;
    if (ev.target.closest && ev.target.closest('.block')) return;
    ev.preventDefault();
    const pointerId = ev.pointerId;
    const start = stagePoint(ev);
    let selecting = false;
    let latest = start;
    stage.setPointerCapture(pointerId);

    const move = e => {
      latest = stagePoint(e);
      if (!selecting && Math.hypot(latest.x - start.x, latest.y - start.y) > 6) {
        selecting = true;
        clearSelection();
      }
      if (!selecting) return;
      const rect = normalizedRect(start, latest);
      setSelectionBox(rect);
      const inside = blocksInRect(rect);
      selected.clear();
      blocks.forEach(item => item.el.classList.remove('selected'));
      inside.forEach(item => setSelected(item.id, true));
    };

    const up = e => {
      stage.removeEventListener('pointermove', move);
      stage.removeEventListener('pointerup', up);
      stage.removeEventListener('pointercancel', up);
      try { stage.releasePointerCapture(pointerId); } catch(_err) {}
      selectionBox.style.display = 'none';
      if (selecting) {
        const rect = normalizedRect(start, stagePoint(e));
        leaveSelectionAfterimage(rect);
        const chosen = blocksInRect(rect);
        if (chosen.length) {
          const c = chosen.reduce((acc,b) => {
            const p = centerOf(b);
            acc.x += p.x; acc.y += p.y;
            return acc;
          }, { x:0, y:0 });
          sparkle(c.x / chosen.length, c.y / chosen.length);
        }
      } else {
        clearSelection();
      }
    };

    stage.addEventListener('pointermove', move);
    stage.addEventListener('pointerup', up);
    stage.addEventListener('pointercancel', up);
  });

  function distance(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

  function closestTen(items){
    if (items.length <= 10) return items.slice(0,10);
    const centroid = items.reduce((acc,b) => {
      const c = centerOf(b);
      acc.x += c.x; acc.y += c.y;
      return acc;
    }, {x:0,y:0});
    centroid.x /= items.length;
    centroid.y /= items.length;
    return items.map(b => ({ b, d:distance(centerOf(b), centroid) })).sort((a,b) => a.d - b.d).slice(0,10).map(x => x.b);
  }

  function findCluster(type, anchor = null){
    const all = [...blocks.values()].filter(b => b.type === type && !b.el.classList.contains('fade-out') && !b.el.classList.contains('fold-out'));
    if (all.length < 10) return null;
    if (anchor) {
      const c = centerOf(anchor);
      return all.map(b => ({ b, d:distance(centerOf(b), c) })).sort((a,b) => a.d - b.d).slice(0,10).map(x => x.b);
    }
    let best = null;
    let bestRadius = Infinity;
    for (const item of all) {
      const c = centerOf(item);
      const group = all.map(b => ({ b, d:distance(centerOf(b), c) })).sort((a,b) => a.d - b.d).slice(0,10);
      const radius = group[group.length - 1].d;
      if (radius < bestRadius) {
        bestRadius = radius;
        best = group.map(x => x.b);
      }
    }
    return best;
  }

  function pickMergeGroup(){
    const sel = selectedBlocks();
    for (const type of ['one','ten']) {
      const group = sel.filter(b => b.type === type);
      if (group.length >= 10) return { group:closestTen(group), newType:higher[type] };
    }
    const active = blocks.get(lastActiveId);
    if (active && (active.type === 'one' || active.type === 'ten')) {
      const group = findCluster(active.type, active);
      if (group) return { group, newType:higher[active.type] };
    }
    for (const type of ['one','ten']) {
      const group = findCluster(type);
      if (group) return { group, newType:higher[type] };
    }
    return null;
  }

  function mergeBlocks(opts = {}){
    if (busy) return;
    const picked = pickMergeGroup();
    if (!picked) { pulse(mergeBtn); return; }
    busy = true;
    if (!opts.skipSave) saveState();
    clearSelection();
    const centers = picked.group.map(centerOf);
    const cx = centers.reduce((sum,p) => sum + p.x, 0) / centers.length;
    const cy = centers.reduce((sum,p) => sum + p.y, 0) / centers.length;
    picked.group.forEach((b,i) => {
      b.el.classList.remove('selected','dragging');
      b.el.style.zIndex = topZ + i;
      b.el.classList.add('fold-out');
      selected.delete(b.id);
      setTimeout(() => { b.el.remove(); blocks.delete(b.id); }, 260);
    });
    setTimeout(() => {
      const nb = addBlock(picked.newType, cx, cy, { center:true });
      clearSelection();
      setSelected(nb.id, true);
      sparkle(cx, cy);
      busy = false;
    }, 260);
  }

  function splitTargets(){
    let targets = selectedBlocks().filter(b => b.type === 'ten' || b.type === 'hundred');
    if (targets.length) return targets;
    const active = blocks.get(lastActiveId);
    if (active && (active.type === 'ten' || active.type === 'hundred')) return [active];
    const hundred = [...blocks.values()].find(b => b.type === 'hundred');
    if (hundred) return [hundred];
    const ten = [...blocks.values()].find(b => b.type === 'ten');
    return ten ? [ten] : [];
  }

  function splitBlocks(opts = {}){
    if (busy) return;
    const targets = splitTargets();
    if (!targets.length) { pulse(splitBtn); return; }
    busy = true;
    if (!opts.skipSave) saveState();
    clearSelection();
    const spawn = [];
    targets.forEach((b, idx) => {
      const toType = lower[b.type];
      const fromSize = blockSize(b.type);
      const toSize = blockSize(toType);
      const u = parseFloat(getComputedStyle(stage).getPropertyValue('--u')) || 54;
      const gap = Math.max(7, u * .15);
      const cols = 5;
      const rows = 2;
      const gridW = cols * toSize.w + (cols - 1) * gap;
      const gridH = rows * toSize.h + (rows - 1) * gap;
      const baseX = b.x + fromSize.w / 2 - gridW / 2 + idx * 11;
      const baseY = b.y + fromSize.h / 2 - gridH / 2 + idx * 11;
      for (let i=0;i<10;i++) {
        spawn.push({ type:toType, x:baseX + (i % cols) * (toSize.w + gap), y:baseY + Math.floor(i / cols) * (toSize.h + gap) });
      }
      b.el.classList.remove('selected','dragging');
      b.el.classList.add('fade-out');
      setTimeout(() => { b.el.remove(); blocks.delete(b.id); }, 230);
      sparkle(b.x + fromSize.w / 2, b.y + fromSize.h / 2);
    });
    setTimeout(() => {
      const made = [];
      spawn.forEach((p,i) => setTimeout(() => made.push(addBlock(p.type, p.x, p.y)), i * 18));
      setTimeout(() => {
        clearSelection();
        made.slice(0,10).forEach(b => setSelected(b.id, true));
        busy = false;
      }, 260 + spawn.length * 18);
    }, 160);
  }

  function deleteTargets(){
    const sel = selectedBlocks();
    if (sel.length) return sel;
    const active = blocks.get(lastActiveId);
    return active ? [active] : [];
  }

  function deleteBlocks(opts = {}){
    if (busy) return;
    const targets = deleteTargets();
    if (!targets.length) { pulse(deleteBtn); return; }
    busy = true;
    if (!opts.skipSave) saveState();
    targets.forEach(b => {
      selected.delete(b.id);
      b.el.classList.remove('selected','dragging');
      b.el.classList.add('fade-out');
      const c = centerOf(b);
      sparkle(c.x, c.y);
      setTimeout(() => { b.el.remove(); blocks.delete(b.id); }, 230);
    });
    setTimeout(() => { busy = false; }, 260);
  }

  function setMode(next){
    mode = mode === next ? 'select' : next;
    penBtn.classList.toggle('active', mode === 'pen');
    highBtn.classList.toggle('active', mode === 'high');
    eraserBtn.classList.toggle('active', mode === 'eraser');
    canvas.classList.toggle('active', mode === 'pen' || mode === 'high' || mode === 'eraser');
    stage.style.cursor = mode === 'select' ? 'default' : 'crosshair';
  }

  let drawing = false;
  let lastPoint = null;

  function drawTo(ev){
    const p = stagePoint(ev);
    if (!lastPoint) lastPoint = p;
    ctx.beginPath();
    ctx.moveTo(lastPoint.x, lastPoint.y);
    ctx.lineTo(p.x, p.y);
    if (mode === 'pen') {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = 'rgba(24,31,44,.94)';
      ctx.lineWidth = 4.5;
    } else if (mode === 'high') {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = 'rgba(255,228,64,.42)';
      ctx.lineWidth = 25;
    } else {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)';
      ctx.lineWidth = 36;
    }
    ctx.stroke();
    lastPoint = p;
  }

  canvas.addEventListener('pointerdown', ev => {
    if (!(mode === 'pen' || mode === 'high' || mode === 'eraser')) return;
    ev.preventDefault();
    saveState();
    drawing = true;
    lastPoint = stagePoint(ev);
    canvas.setPointerCapture(ev.pointerId);
    drawTo(ev);
  });
  canvas.addEventListener('pointermove', ev => {
    if (!drawing) return;
    ev.preventDefault();
    drawTo(ev);
  });
  function endDrawing(ev){
    if (!drawing) return;
    drawing = false;
    lastPoint = null;
    ctx.globalCompositeOperation = 'source-over';
    try { canvas.releasePointerCapture(ev.pointerId); } catch(_e) {}
  }
  canvas.addEventListener('pointerup', endDrawing);
  canvas.addEventListener('pointercancel', endDrawing);

  function makePaletteGhost(type, ev){
    const ghost = document.createElement('div');
    ghost.className = `ghost ${type}`;
    ghost.textContent = labels[type];
    document.body.appendChild(ghost);
    ghost.style.left = `${ev.clientX}px`;
    ghost.style.top = `${ev.clientY}px`;
    return ghost;
  }

  function onStampPointerDown(ev){
    ev.preventDefault();
    const stamp = ev.currentTarget;
    const type = stamp.dataset.type;
    const pointerId = ev.pointerId;
    const sx = ev.clientX;
    const sy = ev.clientY;
    let dragged = false;
    let ghost = null;
    stamp.setPointerCapture(pointerId);

    const move = e => {
      if (!dragged && Math.hypot(e.clientX - sx, e.clientY - sy) > 5) {
        dragged = true;
        ghost = makePaletteGhost(type, e);
      }
      if (ghost) {
        ghost.style.left = `${e.clientX}px`;
        ghost.style.top = `${e.clientY}px`;
      }
    };

    const up = e => {
      stamp.removeEventListener('pointermove', move);
      stamp.removeEventListener('pointerup', up);
      stamp.removeEventListener('pointercancel', up);
      try { stamp.releasePointerCapture(pointerId); } catch(_err) {}
      if (ghost) ghost.remove();
      const p = stagePoint(e);
      if (!dragged || p.inside) {
        saveState();
        setMode('select');
        clearSelection();
        const s = blockSize(type);
        const spot = dragged ? { x:p.x - s.w / 2, y:p.y - s.h / 2 } : defaultSpot(type);
        const b = addBlock(type, spot.x, spot.y);
        setSelected(b.id, true);
        sparkle(b.x + s.w / 2, b.y + s.h / 2);
      }
    };

    stamp.addEventListener('pointermove', move);
    stamp.addEventListener('pointerup', up);
    stamp.addEventListener('pointercancel', up);
  }

  stamps.forEach(stamp => stamp.addEventListener('pointerdown', onStampPointerDown));

  function clampAllBlocks(){
    blocks.forEach(b => { clampBlock(b); positionBlock(b); });
  }

  function debounce(fn, wait){
    let t;
    return () => { clearTimeout(t); t = setTimeout(fn, wait); };
  }

  undoBtn.addEventListener('click', undo);
  mergeBtn.addEventListener('click', () => mergeBlocks());
  splitBtn.addEventListener('click', () => splitBlocks());
  deleteBtn.addEventListener('click', () => deleteBlocks());
  penBtn.addEventListener('click', () => setMode('pen'));
  highBtn.addEventListener('click', () => setMode('high'));
  eraserBtn.addEventListener('click', () => setMode('eraser'));
  fullBtn.addEventListener('click', async () => {
    try {
      if (!document.fullscreenElement) await app.requestFullscreen();
      else await document.exitFullscreen();
      pulse(fullBtn);
      setTimeout(() => { fitUnit(); resizeCanvas(true); clampAllBlocks(); }, 120);
    } catch(_e) { pulse(fullBtn); }
  });

  document.addEventListener('keydown', ev => {
    if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === 'z') { ev.preventDefault(); undo(); }
    if (ev.key === 'Escape') setMode('select');
    if ((ev.key === 'Delete' || ev.key === 'Backspace') && mode === 'select') deleteBlocks();
  });

  window.addEventListener('resize', debounce(() => {
    fitUnit();
    resizeCanvas(true);
    clampAllBlocks();
  }, 120));

  fitUnit();
  resizeCanvas(false);
})();
</script>
</body>
</html>
